<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 720" width="480" height="720" role="img" aria-label="Front elevation drawing of the Nightmare Kart upright arcade cabinet">
  <defs>
    <pattern id="cedar" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#15140F" stroke-width="1" opacity="0.34"/>
    </pattern>
    <pattern id="cedarV" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="9" stroke="#15140F" stroke-width="0.8" opacity="0.18"/>
    </pattern>
  </defs>
  <style>
    .ln{fill:none;stroke:#15140F;stroke-width:1.4;}
    .thin{fill:none;stroke:#15140F;stroke-width:0.9;}
    .dim{fill:none;stroke:#15140F;stroke-width:0.8;opacity:.55;}
    .acc{fill:none;stroke:#C40021;stroke-width:1.6;}
    .t{font-family:ui-monospace,'SFMono-Regular',Menlo,monospace;fill:#86857D;}
    .tk{font-family:ui-monospace,'SFMono-Regular',Menlo,monospace;fill:#15140F;}
    .tr{font-family:ui-monospace,'SFMono-Regular',Menlo,monospace;fill:#C40021;}
  </style>

  <!-- right-side depth sliver -->
  <path class="thin" d="M360 150 L388 132 L388 648 L360 668 Z" fill="url(#cedarV)"/>

  <!-- cabinet body outline -->
  <path class="ln" d="M120 150 L360 150 L360 668 L120 668 Z" fill="#ffffff"/>

  <!-- marquee header (lit sign) -->
  <path class="acc" d="M108 78 L372 78 L372 138 L108 138 Z" fill="#fff"/>
  <line class="thin" x1="108" y1="120" x2="372" y2="120" opacity=".4"/>
  <text class="tr" x="240" y="106" text-anchor="middle" font-size="15" letter-spacing="2" font-weight="bold">NIGHTMARE KART</text>
  <text class="t" x="240" y="131" text-anchor="middle" font-size="6.5" letter-spacing="3">FAUX STAINED GLASS · BACKLIT MARQUEE</text>

  <!-- screen bezel + recessed monitor -->
  <rect class="ln" x="138" y="168" width="204" height="176"/>
  <rect class="thin" x="156" y="186" width="168" height="140" fill="#15140F" opacity=".9"/>
  <line class="thin" x1="156" y1="186" x2="324" y2="326" stroke="#fff" opacity=".12"/>
  <text class="t" x="240" y="360" text-anchor="middle" font-size="7" letter-spacing="2">24″ CRT-STYLE LCD</text>

  <!-- control deck (angled shelf) -->
  <path class="ln" d="M132 386 L348 386 L362 432 L118 432 Z" fill="#fff"/>
  <circle class="acc" cx="188" cy="409" r="9"/><circle cx="188" cy="409" r="2.2" fill="#C40021"/>
  <circle class="acc" cx="292" cy="409" r="9"/><circle cx="292" cy="409" r="2.2" fill="#C40021"/>
  <g class="thin">
    <circle cx="214" cy="404" r="4"/><circle cx="228" cy="406" r="4"/><circle cx="242" cy="409" r="4"/>
    <circle cx="266" cy="404" r="4"/><circle cx="252" cy="406" r="4"/>
  </g>
  <text class="t" x="240" y="452" text-anchor="middle" font-size="7" letter-spacing="2">TWO-PLAYER · SANWA · FLOAT-MOUNTED</text>

  <!-- lower front panel: charred cedar (shou sugi ban) -->
  <rect x="120" y="470" width="240" height="198" fill="url(#cedar)"/>
  <rect class="ln" x="120" y="470" width="240" height="198" fill="none"/>
  <text class="t" x="129" y="486" font-size="6.5" letter-spacing="2">SHOU SUGI BAN — CHARRED CEDAR</text>
  <!-- coin door -->
  <rect class="ln" x="206" y="556" width="68" height="74"/>
  <line class="thin" x1="206" y1="592" x2="274" y2="592"/>
  <circle class="thin" cx="240" cy="574" r="5"/>
  <rect class="thin" x="226" y="606" width="28" height="9"/>
  <text class="t" x="240" y="648" text-anchor="middle" font-size="6.5" letter-spacing="2">RECESSED COIN DOOR</text>

  <!-- base plinth -->
  <rect class="ln" x="114" y="668" width="252" height="26" fill="#fff"/>

  <!-- WIDTH dimension (top) -->
  <line class="dim" x1="120" y1="52" x2="360" y2="52"/>
  <line class="dim" x1="120" y1="46" x2="120" y2="58"/>
  <line class="dim" x1="360" y1="46" x2="360" y2="58"/>
  <rect x="222" y="44" width="36" height="16" fill="#fff"/>
  <text class="tk" x="240" y="56" text-anchor="middle" font-size="10">32″</text>

  <!-- HEIGHT dimension (right) -->
  <line class="dim" x1="430" y1="78" x2="430" y2="694"/>
  <line class="dim" x1="424" y1="78" x2="436" y2="78"/>
  <line class="dim" x1="424" y1="694" x2="436" y2="694"/>
  <rect x="420" y="378" width="20" height="34" fill="#fff"/>
  <text class="tk" x="430" y="399" text-anchor="middle" font-size="10" transform="rotate(90 430 396)">72″ incl. base</text>

  <!-- caption -->
  <text class="t" x="120" y="712" font-size="7.5" letter-spacing="3">P-04 · NIGHTMARE KART — FRONT ELEVATION · STAND-IN DRAWING</text>
</svg>
