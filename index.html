<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>MODE MODE — Field Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{ color-scheme:light;
    --ground:#F3F3F0; --panel:#FBFBF9; --ink:#16160F; --grey:#8C8C86; --grey-2:#B4B4AE;
    --hair:rgba(22,22,15,.14); --hair-2:rgba(22,22,15,.07); --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:#F3F3F0;}
  body{font-family:var(--mono);color:var(--ink);background:var(--ground);overflow:hidden;-webkit-font-smoothing:antialiased;}
  #stage{position:fixed;inset:0;}
  canvas#field{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}
  .corner{position:absolute;width:14px;height:14px;border:1px solid var(--grey-2);pointer-events:none;opacity:.7;}
  .corner.tl{top:18px;left:18px;border-right:0;border-bottom:0;}
  .corner.tr{top:18px;right:18px;border-left:0;border-bottom:0;}
  .corner.bl{bottom:18px;left:18px;border-right:0;border-top:0;}
  .corner.br{bottom:18px;right:18px;border-left:0;border-top:0;}
  .wordmark{position:absolute;top:30px;left:36px;user-select:none;z-index:5;color:var(--ink);}
  .wordmark .mm-logo{display:block;width:94px;height:auto;}
  .topctrls{position:absolute;top:30px;right:36px;z-index:30;display:flex;align-items:center;gap:9px;}
  .modeToggle{display:flex;border:1px solid var(--hair);background:var(--panel);}
  .modeToggle button{font-family:var(--mono);font-size:10px;letter-spacing:.14em;padding:8px 13px;border:0;background:none;color:var(--grey);cursor:pointer;}
  .modeToggle button.on{background:var(--ink);color:var(--ground);}
  .iconBtn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:1px solid var(--hair);background:var(--panel);color:var(--grey);cursor:pointer;padding:0;}
  .iconBtn:hover{color:var(--ink);border-color:var(--grey-2);}
  .iconBtn svg{display:block;}
  .tabbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;border-bottom:1px solid var(--hair);}
  .tabs{display:flex;gap:20px;}
  .tab{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--grey-2);background:none;border:0;padding:7px 1px 9px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
  .tab.on{color:var(--ink);border-bottom-color:var(--ink);}
  .tab:not(.on):hover{color:var(--grey);}
  .axis{position:absolute;font-size:10.5px;letter-spacing:.18em;color:var(--grey);pointer-events:none;white-space:nowrap;z-index:4;}
  .axis .k{color:var(--grey-2);}
  .hint{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);font-size:10px;letter-spacing:.07em;color:var(--grey-2);z-index:6;text-align:center;}
  .hint b{color:var(--grey);font-weight:400;}
  /* inspector */
  .inspector{position:absolute;top:0;right:0;height:100%;width:316px;background:var(--panel);border-left:1px solid var(--hair);
    z-index:20;display:flex;flex-direction:column;transform:translateX(0);transition:transform .3s;}
  .inspector.hidden{transform:translateX(100%);}
  .insp-scroll{overflow-y:auto;padding:74px 20px 24px;flex:1;}
  .sec{margin-bottom:22px;}
  .sec-h{font-size:9.5px;letter-spacing:.2em;color:var(--grey-2);margin-bottom:11px;display:flex;justify-content:space-between;align-items:center;}
  .hgrp{display:flex;gap:5px;align-items:center;}
  .btn.ghost{background:transparent;border:1px solid var(--line);min-width:26px;padding:4px 7px;font-size:12px;line-height:1;}
  .btn:disabled{opacity:.28;cursor:default;pointer-events:none;}
  .btn{font-family:var(--mono);font-size:10px;letter-spacing:.1em;border:1px solid var(--hair);background:none;color:var(--ink);padding:6px 10px;cursor:pointer;transition:.15s;}
  .btn:hover{background:var(--ground);}
  .btn.sm{padding:3px 8px;font-size:9.5px;}
  .btn.danger:hover{background:#FBE9E7;border-color:#E8392B;color:#C0271B;}
  .btn.ghost{border-color:var(--hair-2);color:var(--grey);}
  .proj-row{display:flex;align-items:center;gap:8px;padding:6px 6px 6px 8px;border:1px solid transparent;cursor:pointer;}
  .proj-row:hover{background:var(--ground);}
  .proj-row.sel{border-color:var(--hair);background:var(--ground);}
  .proj-row.drag-over{border-top-color:var(--ink);}
  .proj-row.dragging{opacity:.45;}
  .proj-grip{flex:none;cursor:grab;color:var(--grey-2);font-size:11px;line-height:1;letter-spacing:-2px;opacity:0;transition:.12s;user-select:none;}
  .proj-row:hover .proj-grip{opacity:.5;}
  .proj-grip:hover{opacity:1;color:var(--grey);}
  .proj-grip:active{cursor:grabbing;}
  .proj-dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .proj-code{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;color:var(--grey-2);flex:none;}
  .proj-name-in{flex:1;min-width:0;font-family:var(--mono);font-size:11px;letter-spacing:.03em;color:var(--ink);background:transparent;border:0;border-bottom:1px solid transparent;padding:2px 1px;outline:none;cursor:text;}
  .proj-name-in:hover{border-bottom-color:var(--hair);}
  .proj-name-in:focus{border-bottom-color:var(--ink);}
  .proj-count{font-size:8.5px;color:var(--grey-2);flex:none;min-width:10px;text-align:right;}
  .proj-del{flex:none;width:18px;height:18px;border:0;background:transparent;color:var(--grey-2);font-size:15px;line-height:1;cursor:pointer;opacity:0;transition:.12s;border-radius:3px;}
  .proj-row:hover .proj-del{opacity:.6;}
  .proj-del:hover{opacity:1;color:#c0392b;background:rgba(192,57,43,.08);}
  .field-label{font-size:9.5px;letter-spacing:.1em;color:var(--grey);margin:13px 0 6px;display:flex;justify-content:space-between;}
  .field-label .val{color:var(--ink);}
  input[type=text],select{font-family:var(--mono);font-size:11px;width:100%;padding:7px 9px;border:1px solid var(--hair);background:#fff;color:var(--ink);}
  select{cursor:pointer;}
  .swatches{display:flex;gap:9px;}
  .swatch{flex:1;cursor:pointer;border:1px solid var(--hair);padding:7px;display:flex;align-items:center;gap:8px;}
  .swatch.active{border-color:var(--ink);}
  .swatch .chip{width:22px;height:22px;border-radius:3px;border:1px solid rgba(0,0,0,.12);flex:none;}
  .swatch .lab{font-size:8.5px;letter-spacing:.12em;color:var(--grey);}
  .wheelWrap{margin-top:13px;display:none;} .wheelWrap.show{display:block;}
  .wheelRow{display:flex;gap:14px;align-items:center;}
  #wheel{cursor:crosshair;border-radius:50%;touch-action:none;}
  .wheelMeta{flex:1;}
  .valbar{position:relative;height:14px;margin-top:8px;border:1px solid var(--hair);cursor:pointer;}
  .valbar .thumb{position:absolute;top:-3px;width:3px;height:18px;background:var(--ink);transform:translateX(-50%);pointer-events:none;}
  .hexrow{font-size:10px;letter-spacing:.06em;color:var(--grey);margin-top:9px;}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:2px;background:var(--hair);outline:none;margin:7px 0 2px;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--ink);cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:13px;height:13px;border:0;border-radius:50%;background:var(--ink);cursor:pointer;}
  .node-empty{font-size:10px;color:var(--grey-2);line-height:1.6;letter-spacing:.03em;}
  .row2{display:flex;gap:8px;} .row2 .btn{flex:1;text-align:center;}
  .xy{display:flex;gap:8px;font-size:10px;color:var(--grey);margin-top:4px;}
  .xy span b{color:var(--ink);font-weight:400;}
  .blendRow{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .blendRow button{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;border:1px solid var(--hair);background:none;color:var(--grey);padding:7px 4px;cursor:pointer;}
  .blendRow button.on{background:var(--ink);color:var(--ground);border-color:var(--ink);}
  .overlay{position:fixed;inset:0;background:rgba(22,22,15,.34);z-index:50;display:none;align-items:center;justify-content:center;}
  .overlay.show{display:flex;}
  .modal{background:var(--panel);border:1px solid var(--hair);width:min(620px,90vw);max-height:84vh;display:flex;flex-direction:column;}
  .modal-h{padding:16px 20px;border-bottom:1px solid var(--hair);font-size:11px;letter-spacing:.18em;display:flex;justify-content:space-between;align-items:center;}
  .modal textarea{flex:1;min-height:320px;font-family:var(--mono);font-size:11px;line-height:1.55;border:0;padding:16px 20px;resize:none;background:#fff;color:var(--ink);outline:none;}
  .modal-f{padding:14px 20px;border-top:1px solid var(--hair);display:flex;gap:10px;justify-content:flex-end;}
  .readout{position:absolute;left:36px;top:96px;width:232px;background:var(--panel);border:1px solid var(--hair);padding:14px 16px 15px;opacity:0;transform:translateY(4px);transition:.35s;pointer-events:none;z-index:6;}
  .readout.show{opacity:1;transform:translateY(0);}
  .readout .r-code{font-size:10px;letter-spacing:.18em;color:var(--grey);}
  .readout .r-name{font-size:14px;font-weight:700;margin:5px 0 12px;}
  .readout .r-row{display:flex;justify-content:space-between;font-size:10.5px;padding:4px 0;border-top:1px solid var(--hair-2);}
  .readout .r-row span:first-child{color:var(--grey);}
  .readout .r-sw{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle;}
  .readout .r-open{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:11px;
    border-top:1px solid var(--hair);font-size:10px;letter-spacing:.14em;font-weight:700;text-decoration:none;pointer-events:auto;}
  .readout .r-open:hover{opacity:.6;}
  /* hover-image preview — appears when a project with a page is focused (present mode) */
  #hoverPreview{position:absolute;left:36px;top:300px;width:232px;z-index:8;opacity:0;transform:translateY(6px);
    transition:opacity .3s,transform .3s;pointer-events:none;background:var(--panel);border:1px solid var(--hair);}
  #hoverPreview.show{opacity:1;transform:translateY(0);}
  #hoverPreview img{display:block;width:100%;height:auto;max-height:42vh;object-fit:cover;object-position:center top;}
  #hoverPreview .cap{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--grey);padding:8px 11px;display:flex;justify-content:space-between;gap:8px;}
  #hoverPreview .cap .go{color:var(--accent,#C40021);}
  body.darkbg #hoverPreview{background:#131318;border-color:#2C2C32;}
  .legend{position:absolute;left:36px;bottom:34px;display:flex;flex-direction:column;gap:1px;z-index:6;}
  .legend .lg-h{font-size:9.5px;letter-spacing:.2em;color:var(--grey-2);margin-bottom:8px;}
  .lg-row{display:flex;align-items:center;gap:9px;padding:4px 8px 4px 4px;cursor:pointer;border:1px solid transparent;transition:.2s;}
  .lg-row:hover,.lg-row.active{background:var(--panel);border-color:var(--hair);}
  .lg-row.dim{opacity:.4;}
  .lg-dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .lg-code{font-size:9.5px;letter-spacing:.1em;color:var(--grey);width:30px;flex:none;}
  .lg-name{font-size:10.5px;}
  .lg-tier{font-size:8.5px;letter-spacing:.14em;color:var(--grey-2);margin-left:auto;text-transform:uppercase;padding-left:14px;}
  .present-only{display:none;} body.present .present-only{display:block;} body.present .edit-only{display:none;}
  @media (max-width:760px){ .wordmark .sub,.readout,.legend{display:none;} .inspector{width:100%;} }
  /* effects panel */
  .fx-group{border:1px solid var(--hair-2);margin-bottom:7px;}
  .fx-head{display:flex;justify-content:space-between;align-items:center;padding:9px 11px;cursor:pointer;font-size:9.5px;letter-spacing:.16em;color:var(--grey);user-select:none;}
  .fx-head:hover{background:var(--ground);}
  .fx-head .tw{color:var(--grey-2);font-size:10px;font-family:var(--mono);}
  .fx-body{display:none;padding:3px 11px 12px;border-top:1px solid var(--hair-2);}
  .fx-body.open{display:block;}
  .fx-row{margin:9px 0 0;}
  .fx-row .lab{font-size:9px;letter-spacing:.08em;color:var(--grey);display:flex;justify-content:space-between;align-items:center;}
  .fx-row .lab .v{color:var(--ink);}
  .fx-row input[type=range]{margin:5px 0 0;}
  .fx-row input[type=color]{width:100%;height:24px;border:1px solid var(--hair);background:#fff;cursor:pointer;padding:2px;}
  .fx-toggle{display:flex;align-items:center;gap:8px;font-size:9.5px;letter-spacing:.08em;color:var(--grey);cursor:pointer;margin:10px 0 2px;user-select:none;}
  .fx-toggle .box{width:13px;height:13px;border:1px solid var(--hair);display:inline-flex;align-items:center;justify-content:center;flex:none;}
  .fx-toggle .box.on{background:var(--ink);border-color:var(--ink);}
  .fx-toggle .box.on::after{content:'';width:5px;height:5px;background:var(--ground);}
  .fx-seg{display:flex;gap:5px;flex-wrap:wrap;}
  .fx-seg button{font-family:var(--mono);font-size:9px;letter-spacing:.06em;border:1px solid var(--hair);background:none;color:var(--grey);padding:6px 9px;cursor:pointer;}
  .fx-seg button.on{background:var(--ink);color:var(--ground);border-color:var(--ink);}
  /* dark background chrome */
  body.darkbg{background:#0A0A0C;}
  body.darkbg .wordmark{color:#F1F1EC;}
  body.darkbg .axis{color:#9A9A93;} body.darkbg .axis .k{color:#555;}
  body.darkbg .hint{color:#5A5A56;} body.darkbg .hint b{color:#9A9A93;}
  body.darkbg .corner{border-color:#333;}
  body.darkbg .lg-h{color:#5A5A56;} body.darkbg .lg-name{color:#D8D8D2;} body.darkbg .lg-code{color:#8A8A84;} body.darkbg .lg-tier{color:#555;}
  body.darkbg .lg-row:hover,body.darkbg .lg-row.active{background:#15151A;border-color:#333;}
  body.darkbg .readout{background:#131318;border-color:#2C2C32;}
  body.darkbg .readout .r-name{color:#EDEDE8;} body.darkbg .readout .r-code,body.darkbg .readout .r-row span:first-child{color:#8A8A84;} body.darkbg .readout .r-row{color:#D0D0CA;border-color:#26262C;}
</style>
</head>

  <canvas id="field"></canvas>
  <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

/* storage */
const store={async save(){const s=JSON.stringify({v:2,projects,fx,blend:blendMode});
  try{if(window.storage&&window.storage.set){await window.storage.set('mm_field_v2',s,false);return;}}catch(e){}
  try{localStorage.setItem('mm_field_v2',s);}catch(e){}},
  async load(){try{if(window.storage&&window.storage.get){const r=await window.storage.get('mm_field_v2',false);if(r&&r.value)return JSON.parse(r.value);}}catch(e){}
  try{const s=localStorage.getItem('mm_field_v2');if(s)return JSON.parse(s);}catch(e){}return null;}};
let saveT=null; function persist(){clearTimeout(saveT);saveT=setTimeout(()=>store.save(),350);}

/* undo */
let undoStack=[], redoStack=[];
function snapState(){return JSON.stringify({p:projects,sp:selProj,sn:selNode});}
function applyState(s){const o=JSON.parse(s);Object.keys(buf).forEach(k=>delete buf[k]);projects=o.p;selProj=o.sp;selNode=o.sn;layout();renderInspector();dirty=true;persist();updateUndoUI();}
function pushUndo(){try{undoStack.push(snapState());if(undoStack.length>60)undoStack.shift();redoStack.length=0;updateUndoUI();}catch(e){}}
function undo(){if(!undoStack.length)return;redoStack.push(snapState());applyState(undoStack.pop());}
function redo(){if(!redoStack.length)return;undoStack.push(snapState());applyState(redoStack.pop());}
function updateUndoUI(){const u=document.getElementById('undoBtn'),r=document.getElementById('redoBtn');if(u)u.disabled=!undoStack.length;if(r)r.disabled=!redoStack.length;}

/* canvas */
const cv=document.getElementById('field'), ctx=cv.getContext('2d');
let DPR=1,cssW=0,cssH=0,fL,fT,fW,fH,mfd,lowW,lowH,scl;
const buf={}; let pl={canvas:null,ctx:null}; let alpha={}; let live={}; let dirty=true, lastField=0; let heightBuf=null;
let pert={}; const ANIM_FPS=26;   // per-node render-time animation deltas (not persisted) + field recompute throttle while animating
let gaCur={}, boostCur={}, lastT=0, globalTab=false, dragFrom=null;   // focus-fade easing (per-project alpha+boost), GLOBAL-tab flag, project drag-reorder index
let mag={}, magCur={}, lastMagT=0, magWasActive=false;   // cursor-magnet eased per-node pull offsets (magCur = persistent eased state)
let hover=null, lock=null, mouse={x:-9999,y:-9999,inside:false};
const PANEL_W=316;

/* renderer tuning */
const A_MAX=0.86, S_LO=0.16, S_HI=0.42, SPREAD_EXP=1.0, H_REF=1.0, T_EXP=0.8, HOVER_BOOST=1.18, FPS=26;
const FIELD_AR=16/9;  // fixed field aspect ratio (w:h) — composition scales to fit, never distorts

function layout(){
  DPR=Math.min(window.devicePixelRatio||1,2); cssW=window.innerWidth; cssH=window.innerHeight;
  cv.width=Math.round(cssW*DPR); cv.height=Math.round(cssH*DPR); ctx.setTransform(DPR,0,0,DPR,0,0);
  const rightChrome=(mode==='edit')?PANEL_W+40:Math.max(110,cssW*0.10);
  const leftM=Math.max(110,cssW*0.10), topM=Math.max(92,cssH*0.13), botM=Math.max(104,cssH*0.16);
  const availW=cssW-leftM-rightChrome, availH=cssH-topM-botM;
  let bw=availW, bh=bw/FIELD_AR; if(bh>availH){ bh=availH; bw=bh*FIELD_AR; }
  fL=leftM+(availW-bw)/2; fT=topM+(availH-bh)/2; fW=bw; fH=bh; mfd=Math.min(fW,fH);
  lowW=Math.max(220,Math.min(440,Math.round(fW*0.5)+130)); lowH=Math.max(150,Math.round(lowW*cssH/cssW)); scl=lowW/cssW;
  projects.forEach(p=>{ if(!buf[p.id]){const c=document.createElement('canvas');buf[p.id]={cv:c,ctx:c.getContext('2d'),img:null};}
    buf[p.id].cv.width=lowW; buf[p.id].cv.height=lowH; buf[p.id].img=buf[p.id].ctx.createImageData(lowW,lowH); });
  heightBuf=new Float32Array(lowW*lowH);
  if(!pl.canvas){pl.canvas=document.createElement('canvas');pl.ctx=pl.canvas.getContext('2d',{willReadFrequently:true});}  // read back every animated frame -> CPU-backed is faster for getImageData
  pl.canvas.width=cssW; pl.canvas.height=cssH;
  ensureFx(); applyBg(); positionAxes(); dirty=true; lastField=0; sceneDirty=true; fxChanged=true;
}
function d2p(x,y){return [fL+(x+1)/2*fW,(fT+fH)-(y+1)/2*fH];}
function p2d(px,py){return [clamp((px-fL)/fW*2-1,-1,1),clamp(((fT+fH)-py)/fH*2-1,-1,1)];}
function positionAxes(){const [cx,cy]=d2p(0,0);
  let e=document.getElementById('ax-digital'); e.style.left=(fL-8)+'px'; e.style.top=cy+'px'; e.style.transform='translate(-100%,-50%)';
  e=document.getElementById('ax-physical'); e.style.left=(fL+fW+8)+'px'; e.style.top=cy+'px'; e.style.transform='translateY(-50%)'; e.style.display=(mode==='edit')?'none':'';
  e=document.getElementById('ax-spatial'); e.style.left=cx+'px'; e.style.top=(fT-10)+'px'; e.style.transform='translateX(-50%)';
  e=document.getElementById('ax-object'); e.style.left=cx+'px'; e.style.top=(fT+fH+8)+'px'; e.style.transform='translateX(-50%)';
}

/* TWO-FIELD metaball: S(spread,radius)->silhouette ; H(height,intensity)->color depth */
function computeLive(){ projects.forEach(p=>{ live[p.id]=p.nodes.map(n=>d2p(n.x,n.y)); }); }

/* ---- organic node animation: render-time perturbation from deterministic per-node seeds ----
   Stored schema stays clean: seeds are derived from node id and cached in _seedCache (module-level,
   never serialized). Each frame `pert[id]` holds {ox,oy (px drift), sx,sy (per-axis radius scale ->
   oblong breathing), di,df (intensity / drop-off multipliers)}. Frozen while dragging so editing stays
   precise; identity (no entry) when animation is off, so the static-cache fast path is untouched. */
const _seedCache={};
function nodeSeeds(id){ let s=_seedCache[id]; if(s)return s;
  let h=2166136261>>>0; for(let i=0;i<id.length;i++){ h=Math.imul(h^id.charCodeAt(i),16777619); }
  const r=k=>{ let x=Math.imul((h^Math.imul(k,2654435761))>>>0,2246822519); x^=x>>>13; x=Math.imul(x,3266489917); x^=x>>>16; return (x>>>0)/4294967295; };
  s={ wx:(r(1)*4096)|0, wy:(r(2)*4096)|0,            // walk-noise lattice rows (decorrelated per node)
      phw:r(3)*6.2832, phh:r(4)*6.2832, phi:r(5)*6.2832, phf:r(6)*6.2832,  // breathing/dev phase offsets
      fw:0.65+r(7)*0.9, fh:0.65+r(8)*0.9, fi:0.65+r(9)*0.9, ff:0.65+r(10)*0.9, // per-node cadence (diff intervals)
      av:r(11) };                                    // per-node amplitude weight (variance spread)
  _seedCache[id]=s; return s; }
/* smooth 1-D value noise in time for the random walk (reuses hsh, declared below) */
function tnoise(seed,x){ const xi=Math.floor(x), xf=x-xi, u=xf*xf*(3-2*xf); return hsh(seed,xi)*(1-u)+hsh(seed,xi+1)*u; }
function animEnabled(){ const a=fx.anim; return !!(a&&a.on) && a.amount>0.001 && !drag; }
function nodePert(n,t){ const A=fx.anim, s=nodeSeeds(n.id), m=A.amount, va=lerp(1,s.av,A.variance), T=t*0.001*A.speed;
  const wx=(tnoise(s.wx,T*0.6*s.fw)-0.5)*2, wy=(tnoise(s.wy,T*0.6*s.fh)-0.5)*2, wamp=A.walk*m*va*mfd;
  const bw=Math.sin(T*1.6*s.fw+s.phw), bh=Math.sin(T*1.35*s.fh+s.phh), bamp=A.breathe*m*va;
  const di=1+A.intens*m*va*Math.sin(T*1.1*s.fi+s.phi);
  const df=1+A.fall*m*va*Math.sin(T*0.85*s.ff+s.phf);
  return { ox:wx*wamp, oy:wy*wamp, sx:1+bamp*bw, sy:1+bamp*bh, di, df }; }
function computePert(t){ pert={}; if(!animEnabled())return; projects.forEach(p=>p.nodes.forEach(n=>{ pert[n.id]=nodePert(n,t); })); }

/* cursor magnet: nodes whose centres fall inside the reach get gently pulled toward the mouse — additive on top of
   undulation, frozen while dragging. Pull = proximity^2 (ramps near centre) x node intensity x user strength, capped so
   it never overshoots the cursor. Moving the field naturally shifts colour too (the enticing part). Returns whether
   any node is affected so the render loop knows to recompute. */
function computeMagnet(t){ const m=fx.magnet;
  const active=!!(m&&m.on)&&!drag&&mouse.inside;
  const targets={};
  if(active){ const R=m.radius, R2=R*R, str=clamp(m.strength,0,1), MAX=R*0.20;
    if(R>0&&str>0){ projects.forEach(p=>{ const lp=live[p.id]; if(!lp)return; p.nodes.forEach((n,j)=>{
      const dx=mouse.x-lp[j][0], dy=mouse.y-lp[j][1], d2=dx*dx+dy*dy; if(d2>=R2)return;
      const d=Math.sqrt(d2)||1e-4, prox=1-d/R; let amt=prox*prox*str*(0.3+n.i*0.9)*MAX; if(amt>d*0.85)amt=d*0.85;
      targets[n.id]={ox:(dx/d)*amt, oy:(dy/d)*amt};
    });}); } }
  // asymmetric ease: fast attack (responsive gooey follow), slow release (no snap-back when leaving the radius)
  const dt=Math.min(0.05,(lastMagT?(t-lastMagT):0)/1000); lastMagT=t;
  const kA=1-Math.exp(-dt/0.045), kR=1-Math.exp(-dt/Math.max(0.001,m&&m.ease!=null?m.ease:0.18));
  mag={}; let any=false;
  const ids=new Set([...Object.keys(magCur),...Object.keys(targets)]);
  ids.forEach(id=>{ const tg=targets[id]||{ox:0,oy:0}, cur=magCur[id]||{ox:0,oy:0};
    const tmag=Math.hypot(tg.ox,tg.oy), cmag=Math.hypot(cur.ox,cur.oy), k=(tmag>=cmag)?kA:kR;
    const nx=cur.ox+(tg.ox-cur.ox)*k, ny=cur.oy+(tg.oy-cur.oy)*k;
    if(Math.abs(nx)<0.04&&Math.abs(ny)<0.04&&!targets[id]){ delete magCur[id]; }
    else { magCur[id]={ox:nx,oy:ny}; mag[id]=magCur[id]; any=true; }
  });
  return any;
}

function computeField(p,boost){ boost=boost||1; const b=buf[p.id]; if(!b)return;
  const lp=live[p.id]||p.nodes.map(n=>d2p(n.x,n.y));
  const S=new Float32Array(lowW*lowH), H=new Float32Array(lowW*lowH);
  const SE=1.8-clamp(fx.curve!=null?fx.curve:0.64,0,1)*1.25;   // global metaball curvature -> spread falloff exponent (0.64 -> 1.0 = prior look)
  p.nodes.forEach((n,j)=>{ const pt=pert[n.id], mg=mag[n.id];
    const ox=(pt?pt.ox:0)+(mg?mg.ox:0), oy=(pt?pt.oy:0)+(mg?mg.oy:0), ssx=pt?pt.sx:1, ssy=pt?pt.sy:1, ni=n.i*(pt?pt.di:1), nf=n.f*(pt?pt.df:1);
    const px=(lp[j][0]+ox)*scl, py=(lp[j][1]+oy)*scl, Rx=n.r*mfd*ssx*scl, Ry=n.r*mfd*ssy*scl; if(Rx<=0||Ry<=0)return;
    const irx2=1/(Rx*Rx), iry2=1/(Ry*Ry);                 // anisotropic (elliptical) falloff -> oblong blobs
    const x0=Math.max(0,Math.floor(px-Rx)),x1=Math.min(lowW,Math.ceil(px+Rx)),y0=Math.max(0,Math.floor(py-Ry)),y1=Math.min(lowH,Math.ceil(py+Ry));
    for(let y=y0;y<y1;y++){const dy=y-py,dy2=dy*dy*iry2,row=y*lowW;
      for(let x=x0;x<x1;x++){const dx=x-px,nd=dx*dx*irx2+dy2; if(nd>=1)continue; const u=1-nd;
        S[row+x]+=Math.pow(u,SE);                // spread (curvature-controlled)
        H[row+x]+=ni*Math.pow(u,nf);             // height = intensity-weighted (intensity/drop-off may breathe)
      }}});
  const edge=p.colors.edge, core=p.colors.core, data=b.img.data, Amax=Math.min(A_MAX*boost,0.97);
  for(let k=0,q=0;k<S.length;k++,q+=4){ const s=S[k];
    if(heightBuf) heightBuf[k]+=H[k];
    const a=smoothstep(S_LO,S_HI,s)*Amax; if(a<=0.003){data[q+3]=0;continue;}
    let t=Math.pow(clamp(H[k]/H_REF*boost,0,1),T_EXP);
    data[q]=lerp(edge[0],core[0],t); data[q+1]=lerp(edge[1],core[1],t); data[q+2]=lerp(edge[2],core[2],t); data[q+3]=a*255;
  }
  b.ctx.putImageData(b.img,0,0);
}
function spreadAt(p,mx,my){ const lp=live[p.id]||p.nodes.map(n=>d2p(n.x,n.y)); let S=0;
  const SE=1.8-clamp(fx.curve!=null?fx.curve:0.64,0,1)*1.25;
  p.nodes.forEach((n,j)=>{const R=n.r*mfd,R2=R*R,dx=mx-lp[j][0],dy=my-lp[j][1],r2=dx*dx+dy*dy; if(r2<R2){S+=Math.pow(1-r2/R2,SE);}});
  return S; }
function projectAt(mx,my){ let best=null,bv=S_LO; projects.forEach(p=>{if(p.code==='P-07')return; const s=spreadAt(p,mx,my); if(s>bv){bv=s;best=p.id;}}); return best; }
function nearestNode(p,mx,my){ const lp=live[p.id]; let bi=0,bd=1e9; p.nodes.forEach((n,j)=>{const d=Math.hypot(mx-lp[j][0],my-lp[j][1]); if(d<bd){bd=d;bi=j;}}); return p.nodes[bi]; }

/* draw helpers */
function drawLattice(g,dark){g=g||ctx;g.fillStyle=dark?'rgba(220,220,225,0.12)':'rgba(140,140,134,0.28)';
  const [cx,cy]=d2p(0,0); const s=Math.max(40,mfd/12);
  let x0=cx-Math.ceil((cx+s)/s)*s, y0=cy-Math.ceil((cy+s)/s)*s;
  for(let x=x0;x<cssW+s;x+=s)for(let y=y0;y<cssH+s;y+=s){g.beginPath();g.arc(x,y,1.4,0,6.283);g.fill();}}
function drawCross(g,dark){g=g||ctx;const [cx,cy]=d2p(0,0);g.strokeStyle=dark?'rgba(220,220,225,0.09)':'rgba(22,22,15,0.06)';g.lineWidth=1;
  g.beginPath();g.moveTo(0,cy);g.lineTo(cssW,cy);g.moveTo(cx,0);g.lineTo(cx,cssH);g.stroke();}
function drawHandles(){const p=getProj(selProj);if(!p)return;const lp=live[p.id];const deep=rgbStr(p.colors.core);
  p.nodes.forEach((n,j)=>{const x=lp[j][0],y=lp[j][1],R=n.r*mfd;
    ctx.beginPath();ctx.arc(x,y,R,0,6.283);ctx.setLineDash([3,4]);ctx.lineWidth=1;ctx.strokeStyle='rgba(22,22,15,0.28)';ctx.stroke();ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(x+R,y,4,0,6.283);ctx.fillStyle='#fff';ctx.fill();ctx.lineWidth=1.3;ctx.strokeStyle='rgba(22,22,15,0.5)';ctx.stroke();
    const sel=(n.id===selNode);
    ctx.beginPath();ctx.arc(x,y,sel?7:5.5,0,6.283);ctx.fillStyle='#fff';ctx.fill();ctx.lineWidth=sel?2:1.4;ctx.strokeStyle=deep;ctx.stroke();
    ctx.beginPath();ctx.arc(x,y,n.core?2.4:1.4,0,6.283);ctx.fillStyle=deep;ctx.fill();
    if(sel)drawNodeLabel(n,x,y,p.colors.core);
    if(n.core){ctx.font='8px JetBrains Mono,monospace';ctx.fillStyle=deep;ctx.textAlign='center';ctx.fillText('CORE',x,y-R-7);}});}
function labelFontStr(){ return (fx.label.size||10)+'px JetBrains Mono,monospace'; }
function nodeLabelAnchor(n,x,y){ const la=n.la||0, d=(fx.label.dist!=null?fx.label.dist:10);   // offset from node CENTER, not outer radius (size-independent)
  const lx=x+Math.cos(la)*d, ly=y+Math.sin(la)*d, c=Math.cos(la);
  const align=c>0.34?'left':(c<-0.34?'right':'center'); return {lx,ly,align}; }
function roundRect(g,x,y,w,h,r){g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath();}
function labelBox(n,x,y){ const {lx,ly,align}=nodeLabelAnchor(n,x,y); ctx.font=labelFontStr();
  const w=ctx.measureText(n.label).width, fs=fx.label.size||10, padX=8, h=fs+8;
  const bx = align==='left'? lx-padX : align==='right'? lx-w-padX : lx-w/2-padX;
  return {lx,ly,align,bx,by:ly-h/2,bw:w+padX*2,bh:h}; }
function hitLabel(n,x,y,px,py){ if(!n.label)return false; const b=labelBox(n,x,y); return px>=b.bx-3&&px<=b.bx+b.bw+3&&py>=b.by-3&&py<=b.by+b.bh+3; }
function drawNodeLabel(n,x,y,core){ if(!n.label)return; const white=(fx.label.style==='white'), bg=fx.label.bg===true;
  const b=labelBox(n,x,y);
  ctx.font=labelFontStr(); ctx.textBaseline='middle'; ctx.textAlign=b.align; ctx.lineJoin='round'; ctx.miterLimit=2;
  if(bg){ roundRect(ctx,b.bx,b.by,b.bw,b.bh,b.bh/2); ctx.fillStyle=white?'rgba(16,16,20,0.92)':'rgba(251,251,249,0.97)'; ctx.fill(); }   // optional chip (off by default) = opposite tone
  ctx.fillStyle=white?'#F4F4EF':'#141418'; ctx.fillText(n.label,b.lx,b.ly);   // plain text, no outline — black for BLACK, off-white for WHITE
}
function drawMarkers(p){const lp=live[p.id];const core=p.colors.core;const deep='rgb('+core[0]+','+core[1]+','+core[2]+')';
  p.nodes.forEach((n,j)=>{ if(!n.label)return;   // unlabeled nodes shape the blob but show no dot / hover surface
    const pt=pert[n.id], mg=mag[n.id];const x=lp[j][0]+(pt?pt.ox:0)+(mg?mg.ox:0),y=lp[j][1]+(pt?pt.oy:0)+(mg?mg.oy:0);
    ctx.beginPath();ctx.arc(x,y,4.2,0,6.283);ctx.fillStyle='#FBFBF9';ctx.fill();ctx.lineWidth=1.4;ctx.strokeStyle=deep;ctx.stroke();
    ctx.beginPath();ctx.arc(x,y,1.5,0,6.283);ctx.fillStyle=deep;ctx.fill();
    drawNodeLabel(n,x,y,core);});}

function render(t){
  computeLive();
  let fi=null;
  if(mode==='present'){
    if(lock) fi=lock;
    else if(mouse.inside){ const best=projectAt(mouse.x,mouse.y); if(best!==hover){hover=best;dirty=true;syncLegend();updateReadout();} fi=hover; }
    else if(hover){hover=null;dirty=true;syncLegend();updateReadout();}
  }
  if(fi!==lastFi){ dirty=true; lastFi=fi; }
  const dark=fx.bg==='black';
  const animOn=animEnabled();
  const magOn=computeMagnet(t);                      // cursor magnet (eased): returns whether any node has an active or easing offset
  // ---- ease each project's composite alpha + intensity boost toward target (smooth hover de-intensify, no snap) ----
  const dimA=clamp(fx.unfocus!=null?fx.unfocus:0.4,0,1);   // opacity unfocused projects fade to (lower = fainter)
  const dt=Math.min(0.05,(lastT?(t-lastT):0)/1000); lastT=t;
  const tau=Math.max(0.001,fx.hoverFade!=null?fx.hoverFade:0.15), kEase=1-Math.exp(-dt/tau);
  let easing=false;
  projects.forEach(p=>{ let tgA,tgB;
    if(mode==='edit'){ tgA=globalTab?1:(p.id===selProj?1:0.45); tgB=1; }   // GLOBAL tab: every project equal, nothing focused
    else { tgA=fi?(p.id===fi?1:dimA):1; tgB=(p.id===fi)?HOVER_BOOST:1; }
    if(gaCur[p.id]==null)gaCur[p.id]=tgA; if(boostCur[p.id]==null)boostCur[p.id]=tgB;
    gaCur[p.id]+=(tgA-gaCur[p.id])*kEase; boostCur[p.id]+=(tgB-boostCur[p.id])*kEase;
    if(Math.abs(tgA-gaCur[p.id])>0.002||Math.abs(tgB-boostCur[p.id])>0.0015)easing=true; else{gaCur[p.id]=tgA;boostCur[p.id]=tgB;} });
  let need = dirty || fxChanged || easing;
  if(animOn && (t-lastField)>=1000/ANIM_FPS) need=true;   // re-introduce a throttled per-frame field recompute while animating
  if(magOn && (t-lastField)>=1000/ANIM_FPS) need=true;   // recompute while the magnet has active/easing offsets
  if(magWasActive && !magOn) need=true;   // final recompute to land offsets at zero
  magWasActive=magOn;
  if(need){
    const _t0=performance.now();
    computePert(t);
    if(heightBuf) heightBuf.fill(0);
    const _tc=performance.now();
    projects.forEach(p=>computeField(p,boostCur[p.id]!=null?boostCur[p.id]:1));
    window.__cfMs=performance.now()-_tc;
    pl.ctx.clearRect(0,0,cssW,cssH);
    projects.forEach(p=>{ const b=buf[p.id]; if(!b)return;
      pl.ctx.globalAlpha=clamp(gaCur[p.id]!=null?gaCur[p.id]:1,0,1); pl.ctx.globalCompositeOperation=blendMode; pl.ctx.imageSmoothingEnabled=true; pl.ctx.imageSmoothingQuality='high';
      pl.ctx.drawImage(b.cv,0,0,lowW,lowH,0,0,cssW,cssH); });

let wheelCanvas,wheelCtx,wheelR=58,wheelC=60,wheelV=1;
function openWheel(){ const wrap=document.getElementById('wheelWrap'); if(!wrap)return; wrap.classList.add('show');
  document.getElementById('swEdge').classList.toggle('active',activeSwatch==='edge');
  document.getElementById('swCore').classList.toggle('active',activeSwatch==='core');
  wheelCanvas=document.getElementById('wheel'); wheelCtx=wheelCanvas.getContext('2d');
  const p=getProj(selProj); const rgb=p.colors[activeSwatch]; const hsv=rgb2hsv(rgb[0],rgb[1],rgb[2]);
  wheelHSV=[hsv[0],hsv[1],hsv[2]]; wheelV=hsv[2]; drawWheel(); updateValbar(); updateHex(); bindWheelEvents(); }
function drawWheel(){ const img=wheelCtx.createImageData(120,120),d=img.data;
  for(let y=0;y<120;y++)for(let x=0;x<120;x++){const dx=x-wheelC,dy=y-wheelC,r=Math.hypot(dx,dy),q=(y*120+x)*4;
    if(r<=wheelR){let ang=Math.atan2(dy,dx)/(2*Math.PI);if(ang<0)ang+=1;const s=r/wheelR;const c=hsv2rgb(ang,s,wheelV);d[q]=c[0];d[q+1]=c[1];d[q+2]=c[2];d[q+3]=255;}else d[q+3]=0;}
  wheelCtx.putImageData(img,0,0);
  const ang=wheelHSV[0]*2*Math.PI,s=wheelHSV[1],mx=wheelC+Math.cos(ang)*s*wheelR,my=wheelC+Math.sin(ang)*s*wheelR;
  wheelCtx.beginPath();wheelCtx.arc(mx,my,5,0,6.283);wheelCtx.lineWidth=2;wheelCtx.strokeStyle='#fff';wheelCtx.stroke();
  wheelCtx.beginPath();wheelCtx.arc(mx,my,5,0,6.283);wheelCtx.lineWidth=1;wheelCtx.strokeStyle='rgba(0,0,0,.5)';wheelCtx.stroke(); }

  vb.style.background=`linear-gradient(90deg,#000,${rgbStr(pure)})`;th.style.left=(wheelV*100)+'%';}

function bindWheelEvents(){ let dragging=false;
  const pick=e=>{const rect=wheelCanvas.getBoundingClientRect();const x=(e.clientX-rect.left)*(120/rect.width)-wheelC,y=(e.clientY-rect.top)*(120/rect.height)-wheelC;

function fxCtrl(c){ const v=getP(fx,c.p);
  if(c.t==='seg') return `<div class="fx-row"><div class="fx-seg" data-path="${c.p}">${c.o.map(o=>`<button data-val="${o[0]}"${o[0]===v?' class="on"':''}>${o[1]}</button>`).join('')}</div></div>`;
  if(c.t==='tog') return `<div class="fx-toggle" data-path="${c.p}"><span class="box${v?' on':''}"></span>${c.l}</div>`;
  if(c.t==='sl')  return `<div class="fx-row"><div class="lab">${c.l}<span class="v" data-vfor="${c.p}">${c.f(v)}</span></div><input type="range" data-path="${c.p}" data-regen="${c.r||''}" min="${c.mn}" max="${c.mx}" step="${c.st}" value="${v}"></div>`;
  if(c.t==='color')return `<div class="fx-row"><div class="lab">${c.l}</div><input type="color" data-path="${c.p}" value="${hexStr(v)}"></div>`;
  return ''; }
function fxFind(p){for(const g of FXG)for(const c of g.c)if(c.p===p)return c;return null;}
function renderEffects(){ const root=document.getElementById('fxGroups');
  root.innerHTML=FXG.map(g=>`<div class="fx-group"><div class="fx-head" data-g="${g.id}"><span>${g.title}</span><span class="tw">+</span></div><div class="fx-body" id="fxb-${g.id}">${g.c.map(fxCtrl).join('')}</div></div>`).join('');
  if(renderEffects._bound) return; renderEffects._bound=true;   // delegated listeners bind once; innerHTML refresh above re-syncs control values on import
  root.addEventListener('click',e=>{
    const head=e.target.closest('.fx-head'); if(head){const b=document.getElementById('fxb-'+head.dataset.g);const open=b.classList.toggle('open');head.querySelector('.tw').textContent=open?'\u2013':'+';return;}
    const seg=e.target.closest('.fx-seg button'); if(seg){const path=seg.parentNode.dataset.path;setP(fx,path,seg.dataset.val);seg.parentNode.querySelectorAll('button').forEach(b=>b.classList.toggle('on',b===seg));if(path==='bg')applyBg();fxChanged=true;persist();return;}
    const tog=e.target.closest('.fx-toggle'); if(tog){const path=tog.dataset.path;const nv=!getP(fx,path);setP(fx,path,nv);tog.querySelector('.box').classList.toggle('on',nv);fxChanged=true;persist();return;}
  });
  root.addEventListener('input',e=>{ const el=e.target;
    if(el.type==='range'){const path=el.dataset.path;setP(fx,path,+el.value);const vs=root.querySelector('[data-vfor="'+path+'"]');const c=fxFind(path);if(vs&&c)vs.textContent=c.f(+el.value);
      if(el.dataset.regen==='noise')noiseDirty=true; if(el.dataset.regen==='grain')genGrain(); fxChanged=true;persist();}
    else if(el.type==='color'){setP(fx,el.dataset.path,hex2rgb(el.value));fxChanged=true;persist();}
  });
}


function num(v,d){v=+v;return Number.isFinite(v)?v:d;}
function sanitizeProjects(){ projects.forEach(p=>{
  if(!p.colors||typeof p.colors!=='object')p.colors={edge:[200,200,200],core:[120,120,120]};
  if(!Array.isArray(p.colors.edge)||p.colors.edge.length<3)p.colors.edge=[200,200,200];
  if(!Array.isArray(p.colors.core)||p.colors.core.length<3)p.colors.core=[120,120,120];
  if(!Array.isArray(p.nodes))p.nodes=[];
  p.nodes.forEach(n=>{ if(!n.id)n.id=uid();
    n.x=clamp(num(n.x,0),-1,1); n.y=clamp(num(n.y,0),-1,1);
    n.r=clamp(num(n.r,0.18),0.03,0.6); n.i=clamp(num(n.i,0.8),0.05,1); n.f=clamp(num(n.f,2),0.5,4);
    n.core=!!n.core; if(n.label==null)n.label=''; n.la=num(n.la,0); }); }); }

(async function(){ const saved=await store.load();
  const sp=Array.isArray(saved)?saved:(saved&&saved.projects?saved.projects:null);   // v1 = bare projects array; v2 = {projects,fx,blend}
  if(saved&&!Array.isArray(saved)){ if(saved.blend)blendMode=saved.blend; if(saved.fx)applyFx(saved.fx); }
  if(sp&&sp.length){ try{ projects=sp.map(p=>({id:p.id||uid(),code:p.code,name:p.name,tier:p.tier||'medium',colors:p.colors,
    nodes:p.nodes.map(n=>({id:n.id||uid(),x:n.x,y:n.y,r:n.r!=null?n.r:n.radius,i:n.i!=null?n.i:n.intensity,f:n.f!=null?n.f:n.falloff,core:!!n.core,label:n.label||'',la:n.la!=null?n.la:(n.labelAngle!=null?n.labelAngle:0)}))})); selProj=projects[0].id; }catch(e){} }
  sanitizeProjects();
  layout(); renderInspector(); renderEffects(); computeLive(); projects.forEach(p=>computeField(p));
  const ub=document.getElementById('undoBtn'),rb=document.getElementById('redoBtn');
  if(ub)ub.onclick=undo; if(rb)rb.onclick=redo; updateUndoUI();
  requestAnimationFrame(render);
  setMode('present');   // default to PRESENT (viewer) mode; EDIT is one toggle away
  // ?focus=<code> (from a project-page back-link) → lock that project
  try{ const fc=new URLSearchParams(location.search).get('focus');
    if(fc){ const fp=projects.find(x=>x.code===fc); if(fp){ lock=fp.id; hover=fp.id; syncLegend(); updateReadout(); } } }catch(e){}
})();
})();
