name: supabase-keepalive
#
# VESTIGIAL as of 2026-07-19 — SAFE TO DELETE.
# This existed only because the project was on the Supabase free tier, where a project
# sleeps after ~7 days of inactivity; the ping kept it awake. The org is now on Pro
# ($25/mo) and the project is always-on, so there is no pause to prevent.
# It is left in place for now because it is one cheap request every 2 days and it also
# serves as a passive uptime check (the job fails loudly if REST stops returning 200).
# Delete this file whenever you want that noise gone.
#
# The anon key below is public-safe — it is already shipped in the site's client code,
# so no repo secret is needed.
on:
  schedule:
    - cron: "0 9 */2 * *"   # every 2nd day at 09:00 UTC
  workflow_dispatch:         # lets you run it manually from the Actions tab
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake / keep the database active
        run: |
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqdmpwYXJmdWxydHN4ZHNscnBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2ODM1ODIsImV4cCI6MjA5ODI1OTU4Mn0._A1WCuNyCtnJ2Y3U4iqWjvWQe2ANTA6i-sYfuhhcFq4"
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://vjvjparfulrtsxdslrpg.supabase.co/rest/v1/projects?select=slug&limit=1" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY")
          echo "Supabase keep-alive ping → HTTP $code"
          [ "$code" = "200" ] || { echo "unexpected status"; exit 1; }
