name: supabase-keepalive
# Pings the MODE MODE Supabase project every ~2 days so its free tier never idle-pauses
# (free projects sleep after ~7 days of inactivity). The anon key is public-safe — it is
# already shipped in the site's client code, so no repo secret is needed.
on:
  schedule:
    - cron: "0 9 */2 * *"   # every 2nd day at 09:00 UTC
  workflow_dispatch:         # lets you run it manually from the Actions tab
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake / keep the database active
        run: |
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqdmpwYXJmdWxydHN4ZHNscnBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2ODM1ODIsImV4cCI6MjA5ODI1OTU4Mn0._A1WCuNyCtnJ2Y3U4iqWjvWQe2ANTA6i-sYfuhhcFq4"
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://vjvjparfulrtsxdslrpg.supabase.co/rest/v1/projects?select=slug&limit=1" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY")
          echo "Supabase keep-alive ping → HTTP $code"
          [ "$code" = "200" ] || { echo "unexpected status"; exit 1; }
