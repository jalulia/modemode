<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- iOS light-render workaround: force light scheme + explicit light bg on html/body -->
<meta name="color-scheme" content="light">
<link rel="icon" href="data:,"><!-- suppress favicon request (no 404) -->
<title>MODE MODE — Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{ color-scheme:light;
    --ground:#F3F3F0; --ink:#16160F; --grey:#8C8C86; --grey-2:#B4B4AE;
    --hair:rgba(22,22,15,.13); --hair-2:rgba(22,22,15,.07); --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
    --accent:#C40021; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#F3F3F0;}            /* explicit light bg (iOS) */
  body{font-family:var(--mono);color:var(--ink);background:var(--ground);-webkit-font-smoothing:antialiased;font-size:13px;line-height:1.5;}
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;}
  /* viewport corner marks — homepage brand system */
  .corner{position:fixed;width:14px;height:14px;border:1px solid var(--grey-2);pointer-events:none;opacity:.6;z-index:50;}
  .corner.tl{top:14px;left:14px;border-right:0;border-bottom:0;}
  .corner.tr{top:14px;right:14px;border-left:0;border-bottom:0;}
  .corner.bl{bottom:14px;left:14px;border-right:0;border-top:0;}
  .corner.br{bottom:14px;right:14px;border-left:0;border-top:0;}
  .wordmark{position:fixed;top:22px;left:32px;z-index:40;user-select:none;font-weight:700;font-size:12px;letter-spacing:.30em;line-height:1.05;}
  .wordmark .colon{color:var(--grey-2);font-weight:400;}

  .stage{max-width:1680px;margin:0 auto;padding:62px 44px 40px;}
  .page{display:grid;grid-template-columns:minmax(286px,360px) minmax(0,1fr);gap:54px;align-items:start;}

  /* ===================== LEFT RAIL — identity + blob-as-nav ===================== */
  .rail{position:sticky;top:46px;display:flex;flex-direction:column;}
  .back{display:inline-flex;align-items:center;gap:9px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--accent);margin-bottom:30px;align-self:flex-start;}
  .back .dia{width:8px;height:8px;border:1.4px solid var(--accent);transform:rotate(45deg);flex:none;}
  .back:hover{opacity:.7;}
  .ident .code{font-size:11px;letter-spacing:.24em;color:var(--accent);margin-bottom:7px;}
  .ident .name{font-weight:700;font-size:clamp(31px,3.5vw,47px);line-height:.92;letter-spacing:-.015em;color:var(--accent);margin:0 0 20px;word-break:break-word;}

  .readout{border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);padding:11px 0;margin-bottom:8px;}
  .readout .r-row{display:flex;justify-content:space-between;gap:14px;font-size:10px;padding:3px 0;}
  .readout .r-row .k{color:var(--grey);letter-spacing:.04em;}
  .readout .r-row .k em{font-style:normal;color:var(--grey-2);}
  .readout .r-row .v{color:var(--ink);white-space:nowrap;}

  /* the field-map constellation: large, borderless, IS the hero of the rail */
  .blob{margin:6px 0 16px;}
  #minimap{display:block;width:100%;height:auto;cursor:default;}

  /* section nav — editorial: hairline rows, no cards */
  .nav{display:flex;flex-direction:column;border-top:1px solid var(--hair);}
  .nav-item{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--hair-2);cursor:pointer;transition:padding-left .15s;}
  .nav-item .mk{width:9px;height:9px;border-radius:50%;border:1.4px solid var(--accent);flex:none;transition:background .15s;}
  .nav-item .lab{font-size:11px;letter-spacing:.04em;color:var(--accent);}
  .nav-item:hover{padding-left:6px;}
  .nav-item.active .mk{background:var(--accent);}
  .nav-item.active .lab{font-weight:700;}

  /* ===================== RIGHT — work area (content + hero image) ===================== */
  .work{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.08fr);gap:46px;align-items:start;}
  .work.hero-only{grid-template-columns:minmax(0,1fr);}
  .work.no-hero{grid-template-columns:minmax(0,1fr);}
  .work.hero-only .hero{max-width:840px;margin:0 auto;}

  .hero{position:sticky;top:46px;}
  .hero img{display:block;width:100%;height:auto;}
  .hero .cap{font-size:10px;letter-spacing:.04em;color:var(--grey);margin-top:10px;}
  .hero .ph{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;color:var(--grey-2);
    font-size:10px;letter-spacing:.16em;background:repeating-linear-gradient(45deg,#ececE7,#ececE7 8px,#e5e5df 8px,#e5e5df 16px);}

  .content{min-width:0;}
  .content .block{margin:0;}
  .content .block + .block{margin-top:34px;padding-top:34px;border-top:1px solid var(--hair-2);}
  .lbl{font-size:10px;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;margin:0 0 16px;}
  .body p{margin:0 0 13px;font-size:12.5px;line-height:1.72;color:var(--ink);}
  .body p:last-child{margin-bottom:0;}

  .cols{display:grid;grid-template-columns:1fr 1fr;gap:34px;}
  @media (max-width:560px){ .cols{grid-template-columns:1fr;} }
  .col-sub{font-size:12px;font-weight:700;margin:0 0 11px;color:var(--ink);}

  .mc-row{display:grid;grid-template-columns:1fr 230px;gap:26px;align-items:start;}
  .mc-row + .mc-row{margin-top:24px;}
  .mc-row .t{border-left:2px solid var(--accent);padding-left:13px;}
  .mc-row h4{font-size:12px;font-weight:700;margin:0 0 8px;}
  .mc-row p{font-size:11.5px;line-height:1.6;color:var(--grey);margin:0;}
  .mc-row .thumb{width:100%;aspect-ratio:3/2;object-fit:cover;display:block;background:#1a1a1a;}
  .mc-row .thumb.missing{display:flex;align-items:center;justify-content:center;color:var(--grey-2);font-size:9px;letter-spacing:.14em;
    background:repeating-linear-gradient(45deg,#ececE7,#ececE7 7px,#e5e5df 7px,#e5e5df 14px);}
  @media (max-width:560px){ .mc-row{grid-template-columns:1fr;} }

  .blk-img{width:100%;height:auto;display:block;}
  .blk-cap{font-size:10px;letter-spacing:.04em;color:var(--grey);margin-top:9px;}
  .media-embed{position:relative;width:100%;aspect-ratio:16/9;background:#0a0a0c;}
  .media-embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}

  .collab .crow{display:flex;flex-wrap:wrap;align-items:baseline;gap:6px 10px;padding:13px 0;font-size:11.5px;border-top:1px solid var(--hair-2);}
  .collab .crow:first-child{border-top:0;}
  .collab .nm{font-weight:700;color:var(--ink);}
  .collab .ro{color:var(--grey);}
  .collab a{color:var(--accent);border-bottom:1px solid transparent;}
  .collab a:hover{border-bottom-color:var(--accent);}

  /* ===================== FOOTER — prev / next ===================== */
  .foot{display:flex;justify-content:space-between;gap:24px;margin-top:54px;padding-top:20px;border-top:1px solid var(--hair);}
  .navproj{display:flex;align-items:center;gap:12px;font-size:10px;letter-spacing:.10em;text-transform:uppercase;color:var(--grey);}
  .navproj.next{margin-left:auto;text-align:right;}
  .navproj .dia{width:8px;height:8px;border:1.4px solid var(--accent);transform:rotate(45deg);flex:none;}
  .navproj .pn{color:var(--accent);font-weight:700;letter-spacing:.05em;display:block;margin-top:3px;}
  .navproj:hover{color:var(--ink);}
  .navproj.disabled{opacity:.3;pointer-events:none;}

  .errbox{border:1px solid var(--hair);padding:48px;text-align:center;color:var(--grey);}

  @media (max-width:980px){
    .page{grid-template-columns:1fr;gap:36px;}
    .rail,.hero{position:static;}
    .work{grid-template-columns:1fr;gap:30px;}
    .blob{max-width:380px;}
  }
</style>
</head>
<body>
  <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
  <div class="wordmark">MODE<span class="colon">:</span>MODE</div>
  <div class="stage"><div id="root"><!-- rendered by JS --></div></div>

<script>
(function(){
"use strict";

/* ============================================================ util ============================================================ */
const clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t;
const rgbStr=a=>`rgb(${a[0]},${a[1]},${a[2]})`;
const el=(tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;};
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function slugName(slug){return String(slug||'').replace(/[-_]+/g,' ').toUpperCase();}
function paras(body){ return String(body==null?'':body).split(/\n{2,}/).map(p=>'<p>'+esc(p).replace(/\n/g,'<br>')+'</p>').join(''); }
function vimeoSrc(embed){ const s=String(embed||'').trim(); if(!s)return '';
  const m=s.match(/(?:vimeo\.com\/(?:video\/)?)?(\d{6,})/); return m?`https://player.vimeo.com/video/${m[1]}`:(s.startsWith('http')?s:''); }

/* ============================================================
   DATA BOUNDARY — single point all project data flows through.
   Today: fetch the in-repo JSON. Supabase port = replace ONLY this
   function with a query; nothing else in the renderer knows the source.
   Media stays referenced by URL (assets/<slug>/…) — never inlined.
   ============================================================ */
async function loadProject(slug){
  const res=await fetch(`content/${slug}.json`,{cache:'no-cache'});
  if(!res.ok) throw new Error(`content/${slug}.json → HTTP ${res.status}`);
  return await res.json();
}

/* ============================================================
   minimap metaball renderer — mirrors index.html's two-field renderer
   read-only (index.html untouched): S = spread/silhouette, H =
   intensity-weighted height → edge→core lerp; smoothstep alpha.
   Rendered once into an offscreen buffer at virtual res, then the
   constellation's alpha bbox is fit-to-contain in the rail.
   ============================================================ */
const MM={ A_MAX:0.86, S_LO:0.16, S_HI:0.42, H_REF:1.0, T_EXP:0.8, SE:1.6 }; // SE = 1.8 - curve(0.16)*1.25
function smoothstep(a,b,x){const t=clamp((x-a)/(b-a),0,1);return t*t*(3-2*t);}
function computeMetaball(nodes, VW, VH, edge, core){
  const mfd=Math.min(VW,VH);
  const S=new Float32Array(VW*VH), H=new Float32Array(VW*VH);
  const pts=nodes.map(n=>{ const g=n.geom; return [ (g.x+1)/2*VW, VH-(g.y+1)/2*VH ]; }); // y up
  nodes.forEach((n,j)=>{ const g=n.geom; const px=pts[j][0],py=pts[j][1],R=g.r*mfd; if(R<=0)return;
    const ir2=1/(R*R);
    const x0=Math.max(0,Math.floor(px-R)),x1=Math.min(VW,Math.ceil(px+R));
    const y0=Math.max(0,Math.floor(py-R)),y1=Math.min(VH,Math.ceil(py+R));
    for(let y=y0;y<y1;y++){ const dy=y-py,dy2=dy*dy*ir2,row=y*VW;
      for(let x=x0;x<x1;x++){ const dx=x-px,nd=dx*dx*ir2+dy2; if(nd>=1)continue; const u=1-nd;
        S[row+x]+=Math.pow(u,MM.SE); H[row+x]+=g.i*Math.pow(u,g.f);
      }}});
  const buf=document.createElement('canvas'); buf.width=VW; buf.height=VH;
  const bx=buf.getContext('2d'); const img=bx.createImageData(VW,VH), d=img.data;
  let minx=VW,miny=VH,maxx=0,maxy=0,any=false;
  for(let k=0,q=0;k<S.length;k++,q+=4){ const s=S[k];
    const a=smoothstep(MM.S_LO,MM.S_HI,s)*MM.A_MAX; if(a<=0.003){d[q+3]=0;continue;}
    const t=Math.pow(clamp(H[k]/MM.H_REF,0,1),MM.T_EXP);
    d[q]=lerp(edge[0],core[0],t); d[q+1]=lerp(edge[1],core[1],t); d[q+2]=lerp(edge[2],core[2],t); d[q+3]=a*255;
    const x=k%VW, y=(k/VW)|0; if(x<minx)minx=x; if(x>maxx)maxx=x; if(y<miny)miny=y; if(y>maxy)maxy=y; any=true;
  }
  bx.putImageData(img,0,0);
  if(!any){minx=0;miny=0;maxx=VW;maxy=VH;}
  return { buf, pts, bbox:{minx,miny,maxx,maxy} };
}

/* ============================================================ state ============================================================ */
const state={ project:null, sections:[], activeId:null, accent:[196,0,33], mm:null, hoverNodeId:null };
function hasContent(node){ const c=node&&node.content; return !!(c&&Array.isArray(c.blocks)&&c.blocks.length>0&&!c.hidden); }
function buildSections(p){
  const hero=p.classification&&p.classification.hero;
  const out=[{ id:'classification', kind:'classification', title:'CLASSIFICATION', cover:hero, nodeId:null,
    blocks:(p.classification&&p.classification.intro)||[], collaborators:(p.classification&&p.classification.collaborators)||[] }];
  p.nodes.filter(hasContent).sort((a,b)=>((a.content.order||0)-(b.content.order||0))).forEach(n=>out.push({
    id:n.id, kind:'node', title:n.label||'UNTITLED', nodeId:n.id, cover:(n.content&&n.content.cover)||hero, blocks:n.content.blocks }));
  return out;
}

/* ============================================================ block renderers (editorial: red label + plain body, no cards) ============================================================ */
function renderBlock(b){
  const wrap=el('div','block'); const type=b.type||'text';
  const label=t=>{ if(t) wrap.appendChild(el('div','lbl',esc(t))); };
  if(type==='text'){ label(b.title); wrap.appendChild(el('div','body',paras(b.body))); }
  else if(type==='column'){ label(b.title); const cols=el('div','cols');
    (b.columns||[]).forEach(c=>{ const col=el('div');
      col.innerHTML=`${c.title?`<div class="col-sub">${esc(c.title)}</div>`:''}<div class="body">${paras(c.body)}</div>`; cols.appendChild(col); });
    wrap.appendChild(cols); }
  else if(type==='imagePara'){ label(b.title);
    (b.rows||[]).forEach(r=>{ const row=el('div','mc-row');
      row.appendChild(el('div','t',`<h4>${esc(r.title)}</h4><p>${esc(r.body).replace(/\n/g,'<br>')}</p>`));
      if(r.image){ const im=el('img','thumb'); im.src=r.image; im.alt=r.title||''; im.loading='lazy'; row.appendChild(im); }
      else row.appendChild(el('div','thumb missing','AWAITING IMAGE'));
      wrap.appendChild(row); }); }
  else if(type==='image'){ label(b.title);
    if(b.src){ const im=el('img','blk-img'); im.src=b.src; im.alt=b.caption||''; im.loading='lazy'; wrap.appendChild(im);
      if(b.caption)wrap.appendChild(el('div','blk-cap',esc(b.caption))); }
    else wrap.appendChild(el('div','ph','AWAITING IMAGE')); }   // empty-src guard: no request, no 404
  else if(type==='media'){ label(b.title);
    if(b.kind==='video'){ const src=vimeoSrc(b.embed);
      wrap.appendChild(src ? el('div','media-embed',`<iframe src="${esc(src)}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`)
                           : el('div','ph',`AWAITING VIDEO`)); }
    else if(b.src){ const im=el('img','blk-img'); im.src=b.src; im.alt=b.caption||''; im.loading='lazy'; wrap.appendChild(im);
      if(b.caption)wrap.appendChild(el('div','blk-cap',esc(b.caption))); }
    else wrap.appendChild(el('div','ph','AWAITING IMAGE')); }
  else { label(b.title); wrap.appendChild(el('div','body',paras(b.body||''))); }
  return wrap;
}
function renderCollaborators(list){
  const wrap=el('div','block'); wrap.appendChild(el('div','lbl','COLLABORATORS'));
  const c=el('div','collab');
  (list||[]).forEach(p=>{ const host=(p.url||'').replace(/^https?:\/\//,'').replace(/\/$/,'');
    c.appendChild(el('div','crow',`<span class="nm">${esc(p.name)}</span><span class="ro">— ${esc(p.role)}</span>`+(p.url?`<a href="${esc(p.url)}" target="_blank" rel="noopener">${esc(host)}</a>`:''))); });
  wrap.appendChild(c); return wrap;
}

/* ============================================================ active section swap ============================================================ */
function setActive(id){
  const sec=state.sections.find(s=>s.id===id); if(!sec)return; state.activeId=id;
  // dedupe: for a node section, drop an image/media block that just repeats the cover (avoid showing the same image twice)
  let blocks=(sec.blocks||[]).slice();
  if(sec.kind==='node'&&sec.cover) blocks=blocks.filter(b=>{
    const s=(b.type==='media'&&b.kind==='image')?b.src:(b.type==='image'?b.src:null); return !(s&&s===sec.cover); });
  const content=document.getElementById('content'); content.innerHTML='';
  blocks.forEach(b=>content.appendChild(renderBlock(b)));
  if(sec.kind==='classification'&&sec.collaborators&&sec.collaborators.length) content.appendChild(renderCollaborators(sec.collaborators));
  // hero image
  setHero(sec.cover, sec.title);
  // work-area proportions: hero+content / hero-only / no-hero
  const work=document.getElementById('work'); const hasHero=!!sec.cover, hasBody=content.children.length>0;
  work.classList.toggle('hero-only', hasHero && !hasBody);
  work.classList.toggle('no-hero', !hasHero);
  // nav + minimap
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  drawMinimap();
}
function setHero(src,label){
  const hero=document.getElementById('hero'); if(!hero)return;
  if(src){ hero.innerHTML=`<img id="heroImg" src="${esc(src)}" alt="${esc(label||'')}">`; }
  else { hero.innerHTML=`<div class="ph">NO IMAGE</div>`; }
}
let _restoreSrc=null;
function previewNode(nodeId){ const sec=state.sections.find(s=>s.nodeId===nodeId); if(!sec||!sec.cover)return;
  const img=document.getElementById('heroImg'); if(!img)return;
  if(_restoreSrc==null) _restoreSrc=img.getAttribute('src')||''; img.src=sec.cover; }
function restoreFocal(){ if(_restoreSrc==null)return; const img=document.getElementById('heroImg'); if(img&&_restoreSrc)img.src=_restoreSrc; _restoreSrc=null; }

/* ============================================================ minimap draw + interaction ============================================================ */
function drawMinimap(){
  const mm=state.mm; if(!mm)return; const cv=document.getElementById('minimap'); if(!cv)return;
  const ctx=cv.getContext('2d'); const DPR=Math.min(window.devicePixelRatio||1,2);
  const cssW=cv.clientWidth||300; const {bbox}=mm; const bw=bbox.maxx-bbox.minx, bh=bbox.maxy-bbox.miny;
  const pad=14, vbw=bw+pad*2, vbh=bh+pad*2; const scale=cssW/vbw; const cssH=Math.round(vbh*scale);
  cv.width=Math.round(cssW*DPR); cv.height=Math.round(cssH*DPR); cv.style.height=cssH+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0); ctx.clearRect(0,0,cssW,cssH);
  ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
  const sx=bbox.minx-pad, sy=bbox.miny-pad;
  ctx.drawImage(mm.buf, sx,sy,vbw,vbh, 0,0,cssW,cssH);
  mm.markers=[];
  state.project.nodes.forEach((n,j)=>{ const vp=mm.pts[j]; const x=(vp[0]-sx)*scale, y=(vp[1]-sy)*scale;
    const isSection=state.sections.some(s=>s.nodeId===n.id);
    const isActive=isSection&&state.activeId===n.id, isHover=state.hoverNodeId===n.id, accent=rgbStr(state.accent);
    ctx.beginPath(); ctx.arc(x,y,isActive?4.6:3.6,0,6.283);
    ctx.fillStyle=(isActive||isHover)?accent:'#FBFBF9'; ctx.fill(); ctx.lineWidth=isActive?1.9:1.3; ctx.strokeStyle=accent; ctx.stroke();
    if(n.label){ ctx.font='8.5px JetBrains Mono, monospace'; ctx.textBaseline='middle'; ctx.textAlign='left';
      const tx=x+9, ty=y, tw=ctx.measureText(n.label).width;
      ctx.fillStyle='rgba(243,243,240,.78)'; ctx.fillRect(tx-2,ty-6,tw+4,12);
      ctx.fillStyle=isSection?'#16160F':'#9A9A93'; ctx.fillText(n.label,tx,ty); }
    mm.markers.push({id:n.id,x,y,isSection}); });
}
function bindMinimap(){ const cv=document.getElementById('minimap');
  const pick=e=>{ const r=cv.getBoundingClientRect(); const mx=e.clientX-r.left, my=e.clientY-r.top; let best=null,bd=20;
    (state.mm.markers||[]).forEach(m=>{ if(!m.isSection)return; const d=Math.hypot(mx-m.x,my-m.y); if(d<bd){bd=d;best=m;} }); return best; };
  cv.addEventListener('pointermove',e=>{ const m=pick(e); const id=m?m.id:null;
    if(id!==state.hoverNodeId){ state.hoverNodeId=id; drawMinimap(); cv.style.cursor=id?'pointer':'default'; if(id)previewNode(id); else restoreFocal(); } });
  cv.addEventListener('pointerleave',()=>{ if(state.hoverNodeId){state.hoverNodeId=null;drawMinimap();} restoreFocal(); });
  cv.addEventListener('click',e=>{ const m=pick(e); if(m){ restoreFocal(); setActive(m.id); } });
}

/* ============================================================ scaffold ============================================================ */
function buildReadout(p){
  let xmin=9,xmax=-9,ymin=9,ymax=-9;
  p.nodes.forEach(n=>{const g=n.geom;xmin=Math.min(xmin,g.x);xmax=Math.max(xmax,g.x);ymin=Math.min(ymin,g.y);ymax=Math.max(ymax,g.y);});
  const f=v=>(v>=0?'+':'')+v.toFixed(2);
  return `<div class="readout">
    <div class="r-row"><span class="k">DIGITAL <em>⟷</em> PHYSICAL</span><span class="v">${f(xmin)} … ${f(xmax)}</span></div>
    <div class="r-row"><span class="k">OBJECT <em>⟷</em> SPATIAL</span><span class="v">${f(ymin)} … ${f(ymax)}</span></div>
    <div class="r-row"><span class="k">NODES</span><span class="v">${p.nodes.length}</span></div></div>`;
}
function render(p){
  state.project=p; state.accent=(p.colors&&p.colors.core)||p.accent||[196,0,33];
  document.documentElement.style.setProperty('--accent',rgbStr(state.accent));
  document.title=`${p.name} — MODE MODE`;
  state.sections=buildSections(p);

  const root=document.getElementById('root'); root.innerHTML='';
  const page=el('div','page');

  /* LEFT RAIL */
  const rail=el('aside','rail');
  const back=el('a','back','<span class="dia"></span><span>Back to main MODE MODE</span>'); back.href='index.html'; rail.appendChild(back);
  rail.appendChild(el('div','ident',`<div class="code">${esc(p.code||'')}</div><h1 class="name">${esc(p.name||'')}</h1>`));
  rail.appendChild(el('div',null,buildReadout(p)).firstChild);
  rail.appendChild(el('div','blob','<canvas id="minimap"></canvas>'));
  const nav=el('nav','nav');
  state.sections.forEach(s=>{ const it=el('div','nav-item'); it.dataset.id=s.id;
    it.innerHTML=`<span class="mk"></span><span class="lab">${esc(s.title)}</span>`;
    it.addEventListener('click',()=>setActive(s.id));
    if(s.nodeId){ it.addEventListener('pointerenter',()=>{ state.hoverNodeId=s.nodeId; drawMinimap(); previewNode(s.nodeId); });
      it.addEventListener('pointerleave',()=>{ state.hoverNodeId=null; drawMinimap(); restoreFocal(); }); }
    nav.appendChild(it); });
  rail.appendChild(nav);
  page.appendChild(rail);

  /* RIGHT — work area */
  const work=el('div','work'); work.id='work';
  const content=el('section','content'); content.id='content';
  const hero=el('div','hero'); hero.id='hero';
  work.appendChild(content); work.appendChild(hero);
  page.appendChild(work);
  root.appendChild(page);

  /* FOOTER */
  const foot=el('footer','foot');
  const mk=(slug,dir)=>{ const label=dir==='prev'?'Previous Project':'Next Project';
    if(!slug) return el('span','navproj '+dir+' disabled',`<span>${label}</span>`);
    const a=el('a','navproj '+dir, dir==='prev'
      ? `<span class="dia"></span><span>${label}<span class="pn">${esc(slugName(slug))}</span></span>`
      : `<span>${label}<span class="pn">${esc(slugName(slug))}</span></span><span class="dia"></span>`);
    a.href=`project.html?p=${encodeURIComponent(slug)}`; return a; };
  foot.appendChild(mk(p.prev,'prev')); foot.appendChild(mk(p.next,'next'));
  root.appendChild(foot);

  /* minimap compute (virtual 16:9 field) + first paint */
  const edge=(p.colors&&p.colors.edge)||[255,210,51];
  state.mm=computeMetaball(p.nodes,640,360,edge,state.accent);
  drawMinimap(); bindMinimap();
  setActive('classification');
}
function fail(msg){ document.getElementById('root').innerHTML=
  `<div class="errbox">Could not load project.<br><br><span style="font-size:11px">${esc(msg)}</span><br><br>
   <a href="index.html" style="color:var(--accent)">← Back to MODE MODE</a></div>`; }

/* routing: ?p=<slug> (or #slug); default nightmare-kart */
function getSlug(){ const q=new URLSearchParams(location.search).get('p'); const h=location.hash?location.hash.replace(/^#/,''):'';
  return (q||h||'nightmare-kart').trim(); }
let _rz=null; window.addEventListener('resize',()=>{ clearTimeout(_rz); _rz=setTimeout(()=>{ if(state.mm)drawMinimap(); },120); });
(async function init(){ const slug=getSlug();
  try{ const p=await loadProject(slug); render(p); }
  catch(err){ const m=(location.protocol==='file:')
      ? 'This page loads its content over http. Open it from a web server — GitHub Pages, or a local server — not by double-clicking the file (file:// blocks the data fetch).'
      : (err&&err.message?err.message:String(err));
    fail(m); } })();
})();
</script>
</body>
</html>
