<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- iOS light-render workaround: force light scheme + explicit white bg on html/body -->
<meta name="color-scheme" content="light">
<link rel="icon" href="data:,"><!-- suppress favicon request (no 404) -->
<title>MODE MODE — Project</title>
<style>
  /* ===================== brand type — BB Strata (self-hosted) ===================== */
  @font-face{font-family:'BB Strata Pro';src:url('assets/fonts/BBStrataProSEF-Bold.woff2') format('woff2'),
    url('assets/fonts/BBStrataProSEF-Bold.ttf') format('truetype');font-weight:700;font-style:normal;font-display:swap;}
  @font-face{font-family:'BB Strata ML';src:url('assets/fonts/BBStrata-MLRegular.woff2') format('woff2'),
    url('assets/fonts/BBStrata-MLRegular.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap;}

  :root{ color-scheme:light;
    --paper:#FFFFFF; --ink:#15150F; --grey:#86867F; --grey-2:#C2C2BB;
    --hair:rgba(18,18,14,.16); --hair-2:rgba(18,18,14,.07);
    --disp:'BB Strata Pro','Arial Narrow',sans-serif;        /* display — bold only */
    --text:'BB Strata ML',ui-monospace,'SFMono-Regular',Menlo,monospace; /* body / labels */
    --accent:#C40021; }                                       /* overwritten from data (colors.core) */

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#FFFFFF;}            /* white — explicit for iOS */
  body{font-family:var(--text);color:var(--ink);background:var(--paper);
    -webkit-font-smoothing:antialiased;font-size:13px;line-height:1.6;}
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;}

  /* viewport corner marks + wordmark — homepage brand system */
  .corner{position:fixed;width:13px;height:13px;border:1px solid var(--grey-2);pointer-events:none;opacity:.65;z-index:50;}
  .corner.tl{top:14px;left:14px;border-right:0;border-bottom:0;}
  .corner.tr{top:14px;right:14px;border-left:0;border-bottom:0;}
  .corner.bl{bottom:14px;left:14px;border-right:0;border-top:0;}
  .corner.br{bottom:14px;right:14px;border-left:0;border-top:0;}
  .wordmark{position:fixed;top:20px;left:32px;z-index:40;user-select:none;font-family:var(--disp);
    font-size:13px;letter-spacing:.26em;line-height:1;}
  .wordmark .colon{color:var(--grey-2);}

  .stage{max-width:1640px;margin:0 auto;padding:60px 46px 44px;}
  .page{display:grid;grid-template-columns:minmax(280px,344px) minmax(0,1fr);gap:60px;align-items:start;}

  /* ===================== LEFT RAIL — identity + constellation, persistent ===================== */
  .rail{position:sticky;top:44px;display:flex;flex-direction:column;}
  .back{display:inline-flex;align-items:center;gap:9px;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--grey);margin-bottom:34px;align-self:flex-start;}
  .back .dia{width:7px;height:7px;border:1.3px solid var(--accent);transform:rotate(45deg);flex:none;}
  .back:hover{color:var(--ink);}
  .ident .code{font-family:var(--text);font-size:10.5px;letter-spacing:.26em;color:var(--accent);margin-bottom:9px;}
  .ident .name{font-family:var(--disp);font-size:clamp(33px,3.7vw,52px);line-height:.9;letter-spacing:-.005em;
    color:var(--accent);margin:0 0 22px;word-break:break-word;text-transform:uppercase;}

  .readout{border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);padding:12px 0;}
  .readout .r-row{display:flex;justify-content:space-between;gap:14px;font-size:9.5px;padding:3px 0;letter-spacing:.02em;}
  .readout .r-row .k{color:var(--grey);}
  .readout .r-row .k em{font-style:normal;color:var(--grey-2);padding:0 2px;}
  .readout .r-row .v{color:var(--ink);white-space:nowrap;}

  /* the constellation: large, borderless — the identity of the rail (pulled from the homepage) */
  .blob{margin:10px 0 18px;}
  #minimap{display:block;width:100%;height:auto;cursor:default;}

  /* section nav — hairline rows, no cards */
  .nav{display:flex;flex-direction:column;border-top:1px solid var(--hair);}
  .nav-item{display:flex;align-items:center;gap:12px;padding:13px 1px;border-bottom:1px solid var(--hair-2);
    cursor:pointer;transition:padding-left .16s ease;}
  .nav-item .mk{width:8px;height:8px;border-radius:50%;border:1.3px solid var(--accent);flex:none;transition:background .16s;}
  .nav-item .lab{font-size:11px;letter-spacing:.06em;color:var(--grey);text-transform:uppercase;transition:color .16s;}
  .nav-item:hover{padding-left:7px;} .nav-item:hover .lab{color:var(--ink);}
  .nav-item.active .mk{background:var(--accent);}
  .nav-item.active .lab{color:var(--accent);}

  /* ===================== MAIN — content-driven composition ===================== */
  /* A section composes its content blocks with its lead image (only when a real image exists).
     No lead image => the section is text-led at reading measure. No filler is ever drawn. */
  .section{min-width:0;}
  .section.has-lead{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.04fr);gap:56px;align-items:start;}
  .section.text-led .col-text{max-width:640px;}
  .col-text{min-width:0;}
  .col-lead{position:sticky;top:44px;margin:0;}
  .col-lead img{width:100%;height:auto;display:block;}
  .col-lead figcaption{font-size:9.5px;letter-spacing:.04em;color:var(--grey);margin-top:11px;}

  /* blocks: a small red label over plain body, separated by space + hairline. No boxes. */
  .block + .block{margin-top:38px;padding-top:38px;border-top:1px solid var(--hair-2);}
  .lbl{font-family:var(--text);font-size:10px;letter-spacing:.22em;color:var(--accent);text-transform:uppercase;margin:0 0 18px;}
  .lead-para{font-size:15px;line-height:1.62;color:var(--ink);margin:0 0 14px;max-width:34em;}
  .body p{margin:0 0 13px;font-size:13px;line-height:1.72;color:var(--ink);}
  .body p:last-child{margin-bottom:0;}

  .cols{display:grid;grid-template-columns:1fr 1fr;gap:40px;}
  @media (max-width:560px){ .cols{grid-template-columns:1fr;} }
  .col-sub{font-family:var(--disp);font-size:12px;letter-spacing:.02em;margin:0 0 10px;color:var(--ink);text-transform:uppercase;}

  /* image + paragraph rows: text + (real) thumb. Missing image => text spans full width, no box. */
  .mc-row{display:grid;grid-template-columns:1fr;gap:8px 28px;align-items:start;}
  .mc-row.has-img{grid-template-columns:1fr 232px;}
  .mc-row + .mc-row{margin-top:26px;padding-top:26px;border-top:1px solid var(--hair-2);}
  .mc-row .t{border-left:2px solid var(--accent);padding-left:14px;}
  .mc-row h4{font-family:var(--disp);font-size:12.5px;letter-spacing:.01em;margin:0 0 8px;text-transform:uppercase;}
  .mc-row p{font-size:12px;line-height:1.62;color:var(--grey);margin:0;}
  .mc-row .thumb{width:100%;aspect-ratio:3/2;object-fit:cover;display:block;}
  @media (max-width:560px){ .mc-row.has-img{grid-template-columns:1fr;} }

  .blk-img{width:100%;height:auto;display:block;}
  .blk-cap{font-size:9.5px;letter-spacing:.04em;color:var(--grey);margin-top:10px;}
  .media-embed{position:relative;width:100%;aspect-ratio:16/9;background:#0a0a0c;}
  .media-embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}

  .collab .crow{display:flex;flex-wrap:wrap;align-items:baseline;gap:6px 11px;padding:13px 0;font-size:12px;
    border-top:1px solid var(--hair-2);}
  .collab .crow:first-child{border-top:0;padding-top:0;}
  .collab .nm{font-family:var(--disp);color:var(--ink);text-transform:uppercase;letter-spacing:.01em;}
  .collab .ro{color:var(--grey);}
  .collab a{color:var(--accent);border-bottom:1px solid transparent;}
  .collab a:hover{border-bottom-color:var(--accent);}

  /* ===================== FOOTER — prev / next ===================== */
  .foot{display:flex;justify-content:space-between;gap:24px;margin-top:64px;padding-top:20px;border-top:1px solid var(--hair);}
  .navproj{display:flex;align-items:center;gap:12px;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);}
  .navproj.next{margin-left:auto;text-align:right;}
  .navproj .dia{width:7px;height:7px;border:1.3px solid var(--accent);transform:rotate(45deg);flex:none;}
  .navproj .pn{font-family:var(--disp);color:var(--accent);letter-spacing:.02em;display:block;margin-top:4px;font-size:11px;}
  .navproj:hover{color:var(--ink);}
  .navproj.disabled{opacity:.3;pointer-events:none;}

  .errbox{max-width:560px;margin:8vh auto 0;border-top:2px solid var(--accent);padding:28px 0 0;color:var(--grey);
    font-size:13px;line-height:1.7;}
  .errbox a{color:var(--accent);}

  @media (max-width:980px){
    .page{grid-template-columns:1fr;gap:38px;}
    .rail,.col-lead{position:static;}
    .section.has-lead{grid-template-columns:1fr;gap:34px;}
    .col-lead{order:-1;}
    .blob{max-width:360px;}
  }
</style>
</head>
<body>
  <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
  <div class="wordmark">MODE<span class="colon">:</span>MODE</div>
  <div class="stage"><div id="root"><!-- rendered by JS --></div></div>

<script>
(function(){
"use strict";

/* ============================================================ util ============================================================ */
const clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t;
const rgbStr=a=>`rgb(${a[0]},${a[1]},${a[2]})`;
const el=(tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;};
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const real=s=>typeof s==='string'&&s.trim().length>0;   // a usable media reference (never a placeholder)
function slugName(slug){return String(slug||'').replace(/[-_]+/g,' ').toUpperCase();}
function paras(body){ return String(body==null?'':body).split(/\n{2,}/).map(p=>'<p>'+esc(p).replace(/\n/g,'<br>')+'</p>').join(''); }
function vimeoSrc(embed){ const s=String(embed||'').trim(); if(!s)return '';
  const m=s.match(/(?:vimeo\.com\/(?:video\/)?)?(\d{6,})/); return m?`https://player.vimeo.com/video/${m[1]}`:(s.startsWith('http')?s:''); }

/* ============================================================
   DATA BOUNDARY — single point all project data flows through.
   Today: fetch the in-repo JSON. Supabase port = replace ONLY this
   function; nothing else in the renderer knows the source. Media is
   referenced by URL (assets/<slug>/…) — never inlined.
   ============================================================ */
async function loadProject(slug){
  const res=await fetch(`content/${slug}.json`,{cache:'no-cache'});
  if(!res.ok) throw new Error(`content/${slug}.json → HTTP ${res.status}`);
  return await res.json();
}

/* ============================================================
   constellation renderer — mirrors index.html's two-field metaball
   read-only (index.html untouched): S = spread/silhouette, H =
   intensity-weighted height → edge→core lerp; smoothstep alpha.
   ============================================================ */
const MM={ A_MAX:0.86, S_LO:0.16, S_HI:0.42, H_REF:1.0, T_EXP:0.8, SE:1.6 };
function smoothstep(a,b,x){const t=clamp((x-a)/(b-a),0,1);return t*t*(3-2*t);}
function computeMetaball(nodes, VW, VH, edge, core){
  const mfd=Math.min(VW,VH);
  const S=new Float32Array(VW*VH), H=new Float32Array(VW*VH);
  const pts=nodes.map(n=>{ const g=n.geom; return [ (g.x+1)/2*VW, VH-(g.y+1)/2*VH ]; });
  nodes.forEach((n,j)=>{ const g=n.geom; const px=pts[j][0],py=pts[j][1],R=g.r*mfd; if(R<=0)return;
    const ir2=1/(R*R);
    const x0=Math.max(0,Math.floor(px-R)),x1=Math.min(VW,Math.ceil(px+R));
    const y0=Math.max(0,Math.floor(py-R)),y1=Math.min(VH,Math.ceil(py+R));
    for(let y=y0;y<y1;y++){ const dy=y-py,dy2=dy*dy*ir2,row=y*VW;
      for(let x=x0;x<x1;x++){ const dx=x-px,nd=dx*dx*ir2+dy2; if(nd>=1)continue; const u=1-nd;
        S[row+x]+=Math.pow(u,MM.SE); H[row+x]+=g.i*Math.pow(u,g.f);
      }}});
  const buf=document.createElement('canvas'); buf.width=VW; buf.height=VH;
  const bx=buf.getContext('2d'); const img=bx.createImageData(VW,VH), d=img.data;
  let minx=VW,miny=VH,maxx=0,maxy=0,any=false;
  for(let k=0,q=0;k<S.length;k++,q+=4){ const s=S[k];
    const a=smoothstep(MM.S_LO,MM.S_HI,s)*MM.A_MAX; if(a<=0.003){d[q+3]=0;continue;}
    const t=Math.pow(clamp(H[k]/MM.H_REF,0,1),MM.T_EXP);
    d[q]=lerp(edge[0],core[0],t); d[q+1]=lerp(edge[1],core[1],t); d[q+2]=lerp(edge[2],core[2],t); d[q+3]=a*255;
    const x=k%VW, y=(k/VW)|0; if(x<minx)minx=x; if(x>maxx)maxx=x; if(y<miny)miny=y; if(y>maxy)maxy=y; any=true;
  }
  bx.putImageData(img,0,0);
  if(!any){minx=0;miny=0;maxx=VW;maxy=VH;}
  return { buf, pts, bbox:{minx,miny,maxx,maxy} };
}

/* ============================================================ state ============================================================ */
const state={ project:null, sections:[], activeId:null, accent:[196,0,33], mm:null, hoverNodeId:null };
function hasContent(node){ const c=node&&node.content; return !!(c&&Array.isArray(c.blocks)&&c.blocks.length>0&&!c.hidden); }
function leadImage(sec){ return real(sec.cover)?sec.cover:null; }   // only a real photo leads — never a placeholder
function buildSections(p){
  const hero=p.classification&&p.classification.hero;
  const out=[{ id:'classification', kind:'classification', title:'CLASSIFICATION', cover:hero, nodeId:null,
    blocks:(p.classification&&p.classification.intro)||[], collaborators:(p.classification&&p.classification.collaborators)||[] }];
  p.nodes.filter(hasContent).sort((a,b)=>((a.content.order||0)-(b.content.order||0))).forEach(n=>out.push({
    id:n.id, kind:'node', title:n.label||'UNTITLED', nodeId:n.id, cover:(n.content&&n.content.cover)||null, blocks:n.content.blocks }));
  return out;
}

/* ============================================================ block renderers — red label + plain body, no cards, no filler ============================================================ */
function renderBlock(b, opts){
  opts=opts||{};
  const wrap=el('div','block'); const type=b.type||'text';
  const label=t=>{ if(t) wrap.appendChild(el('div','lbl',esc(t))); };
  if(type==='text'){ label(b.title);
    const body=el('div','body',paras(b.body));
    if(opts.lead && body.firstChild) body.firstChild.className='lead-para';   // first overview para reads as a lead statement
    wrap.appendChild(body); }
  else if(type==='column'){ label(b.title); const cols=el('div','cols');
    (b.columns||[]).forEach(c=>{ const col=el('div');
      col.innerHTML=`${c.title?`<div class="col-sub">${esc(c.title)}</div>`:''}<div class="body">${paras(c.body)}</div>`; cols.appendChild(col); });
    wrap.appendChild(cols); }
  else if(type==='imagePara'){ label(b.title);
    (b.rows||[]).forEach(r=>{ const has=real(r.image); const row=el('div','mc-row'+(has?' has-img':''));
      row.appendChild(el('div','t',`<h4>${esc(r.title)}</h4><p>${esc(r.body).replace(/\n/g,'<br>')}</p>`));
      if(has){ const im=el('img','thumb'); im.src=r.image; im.alt=r.title||''; im.loading='lazy'; row.appendChild(im); }
      wrap.appendChild(row); }); }                                  // no image => single-column text row, no box
  else if(type==='image'){ if(!real(b.src))return null; label(b.title);
    const im=el('img','blk-img'); im.src=b.src; im.alt=b.caption||''; im.loading='lazy'; wrap.appendChild(im);
    if(b.caption)wrap.appendChild(el('div','blk-cap',esc(b.caption))); }
  else if(type==='media'){
    if(b.kind==='video'){ const src=vimeoSrc(b.embed); if(!src)return null; label(b.title);
      wrap.appendChild(el('div','media-embed',`<iframe src="${esc(src)}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`)); }
    else { if(!real(b.src))return null; label(b.title);
      const im=el('img','blk-img'); im.src=b.src; im.alt=b.caption||''; im.loading='lazy'; wrap.appendChild(im);
      if(b.caption)wrap.appendChild(el('div','blk-cap',esc(b.caption))); } }
  else { label(b.title); wrap.appendChild(el('div','body',paras(b.body||''))); }
  return wrap;
}
function renderCollaborators(list){
  const wrap=el('div','block'); wrap.appendChild(el('div','lbl','COLLABORATORS'));
  const c=el('div','collab');
  (list||[]).forEach(p=>{ const host=(p.url||'').replace(/^https?:\/\//,'').replace(/\/$/,'');
    c.appendChild(el('div','crow',`<span class="nm">${esc(p.name)}</span><span class="ro">— ${esc(p.role)}</span>`+(p.url?`<a href="${esc(p.url)}" target="_blank" rel="noopener">${esc(host)}</a>`:''))); });
  wrap.appendChild(c); return wrap;
}

/* ============================================================ active section — compose blocks + lead image ============================================================ */
function setActive(id){
  const sec=state.sections.find(s=>s.id===id); if(!sec)return; state.activeId=id;
  const lead=leadImage(sec);
  const main=document.getElementById('main'); main.innerHTML='';
  const secEl=el('section','section '+(lead?'has-lead':'text-led'));
  const colText=el('div','col-text');
  // drop any block whose image just repeats the lead, so the same photo never shows twice
  let blocks=(sec.blocks||[]).slice();
  if(lead) blocks=blocks.filter(b=>{ const s=(b.type==='image'||(b.type==='media'&&b.kind==='image'))?b.src:null; return !(real(s)&&s===lead); });
  const isOverview=sec.kind==='classification';
  blocks.forEach((b,i)=>{ const node=renderBlock(b,{lead:isOverview&&i===0&&b.type==='text'}); if(node) colText.appendChild(node); });
  if(isOverview && sec.collaborators && sec.collaborators.length) colText.appendChild(renderCollaborators(sec.collaborators));
  secEl.appendChild(colText);
  if(lead){ const fig=el('figure','col-lead'); const im=el('img'); im.src=lead; im.alt=sec.title||''; fig.appendChild(im); secEl.appendChild(fig); }
  main.appendChild(secEl);
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  drawMinimap();
}

/* ============================================================ constellation draw + interaction ============================================================ */
function drawMinimap(){
  const mm=state.mm; if(!mm)return; const cv=document.getElementById('minimap'); if(!cv)return;
  const ctx=cv.getContext('2d'); const DPR=Math.min(window.devicePixelRatio||1,2);
  const cssW=cv.clientWidth||300; const {bbox}=mm; const bw=bbox.maxx-bbox.minx, bh=bbox.maxy-bbox.miny;
  const pad=16, vbw=bw+pad*2, vbh=bh+pad*2; const scale=cssW/vbw; const cssH=Math.round(vbh*scale);
  cv.width=Math.round(cssW*DPR); cv.height=Math.round(cssH*DPR); cv.style.height=cssH+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0); ctx.clearRect(0,0,cssW,cssH);
  ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
  const sx=bbox.minx-pad, sy=bbox.miny-pad;
  ctx.drawImage(mm.buf, sx,sy,vbw,vbh, 0,0,cssW,cssH);
  mm.markers=[];
  state.project.nodes.forEach((n,j)=>{ const vp=mm.pts[j]; const x=(vp[0]-sx)*scale, y=(vp[1]-sy)*scale;
    const isSection=state.sections.some(s=>s.nodeId===n.id);
    const isActive=isSection&&state.activeId===n.id, isHover=state.hoverNodeId===n.id, accent=rgbStr(state.accent);
    ctx.beginPath(); ctx.arc(x,y,isActive?4.6:3.4,0,6.283);
    ctx.fillStyle=(isActive||isHover)?accent:'#FFFFFF'; ctx.fill(); ctx.lineWidth=isActive?1.9:1.2; ctx.strokeStyle=accent; ctx.stroke();
    if(n.label){ ctx.font='8.5px "BB Strata ML", ui-monospace, monospace'; ctx.textBaseline='middle'; ctx.textAlign='left';
      const tx=x+9, ty=y, tw=ctx.measureText(n.label).width;
      ctx.fillStyle='rgba(255,255,255,.82)'; ctx.fillRect(tx-2,ty-6,tw+4,12);
      ctx.fillStyle=isSection?'#15150F':'#A6A69F'; ctx.fillText(n.label,tx,ty); }
    mm.markers.push({id:n.id,x,y,isSection}); });
}
function bindMinimap(){ const cv=document.getElementById('minimap');
  const pick=e=>{ const r=cv.getBoundingClientRect(); const mx=e.clientX-r.left, my=e.clientY-r.top; let best=null,bd=20;
    (state.mm.markers||[]).forEach(m=>{ if(!m.isSection)return; const d=Math.hypot(mx-m.x,my-m.y); if(d<bd){bd=d;best=m;} }); return best; };
  cv.addEventListener('pointermove',e=>{ const m=pick(e); const id=m?m.id:null;
    if(id!==state.hoverNodeId){ state.hoverNodeId=id; drawMinimap(); cv.style.cursor=id?'pointer':'default'; } });
  cv.addEventListener('pointerleave',()=>{ if(state.hoverNodeId){state.hoverNodeId=null;drawMinimap();} });
  cv.addEventListener('click',e=>{ const m=pick(e); if(m) setActive(m.id); });
}

/* ============================================================ scaffold ============================================================ */
function buildReadout(p){
  let xmin=9,xmax=-9,ymin=9,ymax=-9;
  p.nodes.forEach(n=>{const g=n.geom;xmin=Math.min(xmin,g.x);xmax=Math.max(xmax,g.x);ymin=Math.min(ymin,g.y);ymax=Math.max(ymax,g.y);});
  const f=v=>(v>=0?'+':'')+v.toFixed(2);
  return `<div class="readout">
    <div class="r-row"><span class="k">DIGITAL <em>⟷</em> PHYSICAL</span><span class="v">${f(xmin)} … ${f(xmax)}</span></div>
    <div class="r-row"><span class="k">OBJECT <em>⟷</em> SPATIAL</span><span class="v">${f(ymin)} … ${f(ymax)}</span></div>
    <div class="r-row"><span class="k">NODES</span><span class="v">${p.nodes.length}</span></div></div>`;
}
function render(p){
  state.project=p; state.accent=(p.colors&&p.colors.core)||p.accent||[196,0,33];
  document.documentElement.style.setProperty('--accent',rgbStr(state.accent));
  document.title=`${p.name} — MODE MODE`;
  state.sections=buildSections(p);

  const root=document.getElementById('root'); root.innerHTML='';
  const page=el('div','page');

  /* LEFT RAIL */
  const rail=el('aside','rail');
  const back=el('a','back','<span class="dia"></span><span>Back to MODE MODE</span>'); back.href='index.html'; rail.appendChild(back);
  rail.appendChild(el('div','ident',`<div class="code">${esc(p.code||'')}</div><h1 class="name">${esc(p.name||'')}</h1>`));
  rail.appendChild(el('div',null,buildReadout(p)).firstChild);
  rail.appendChild(el('div','blob','<canvas id="minimap"></canvas>'));
  const nav=el('nav','nav');
  state.sections.forEach(s=>{ const it=el('div','nav-item'); it.dataset.id=s.id;
    it.innerHTML=`<span class="mk"></span><span class="lab">${esc(s.title)}</span>`;
    it.addEventListener('click',()=>setActive(s.id));
    if(s.nodeId){ it.addEventListener('pointerenter',()=>{ state.hoverNodeId=s.nodeId; drawMinimap(); });
      it.addEventListener('pointerleave',()=>{ state.hoverNodeId=null; drawMinimap(); }); }
    nav.appendChild(it); });
  rail.appendChild(nav);
  page.appendChild(rail);

  /* MAIN */
  const main=el('section','main'); main.id='main';
  page.appendChild(main);
  root.appendChild(page);

  /* FOOTER */
  const foot=el('footer','foot');
  const mk=(slug,dir)=>{ const label=dir==='prev'?'Previous':'Next';
    if(!slug) return el('span','navproj '+dir+' disabled',`<span>${label}</span>`);
    const a=el('a','navproj '+dir, dir==='prev'
      ? `<span class="dia"></span><span>${label}<span class="pn">${esc(slugName(slug))}</span></span>`
      : `<span>${label}<span class="pn">${esc(slugName(slug))}</span></span><span class="dia"></span>`);
    a.href=`project.html?p=${encodeURIComponent(slug)}`; return a; };
  foot.appendChild(mk(p.prev,'prev')); foot.appendChild(mk(p.next,'next'));
  root.appendChild(foot);

  /* constellation compute (virtual 16:9 field) + first paint */
  const edge=(p.colors&&p.colors.edge)||[255,210,51];
  state.mm=computeMetaball(p.nodes,640,360,edge,state.accent);
  drawMinimap(); bindMinimap();
  if(document.fonts&&document.fonts.ready) document.fonts.ready.then(()=>{ if(state.mm)drawMinimap(); });
  setActive('classification');
}
function fail(msg){ document.getElementById('root').innerHTML=
  `<div class="errbox"><strong style="color:var(--ink)">Could not load this project.</strong><br><br>${esc(msg)}<br><br>
   <a href="index.html">← Back to MODE MODE</a></div>`; }

/* routing: ?p=<slug> (or #slug); default nightmare-kart */
function getSlug(){ const q=new URLSearchParams(location.search).get('p'); const h=location.hash?location.hash.replace(/^#/,''):'';
  return (q||h||'nightmare-kart').trim(); }
let _rz=null; window.addEventListener('resize',()=>{ clearTimeout(_rz); _rz=setTimeout(()=>{ if(state.mm)drawMinimap(); },120); });
(async function init(){ const slug=getSlug();
  try{ const p=await loadProject(slug); render(p); }
  catch(err){ const m=(location.protocol==='file:')
      ? 'This page loads its content over http. Open it from a web server — GitHub Pages, or a local server — not by double-clicking the file (file:// blocks the data fetch).'
      : (err&&err.message?err.message:String(err));
    fail(m); } })();
})();
</script>
</body>
