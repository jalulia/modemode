<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<link rel="icon" href="data:,">
<title>MODE MODE — Project</title>
<style>
  @font-face{font-family:'BB Strata Pro';src:url('assets/fonts/BBStrataProSEF-Bold.woff2') format('woff2'),
    url('assets/fonts/BBStrataProSEF-Bold.ttf') format('truetype');font-weight:700;font-style:normal;font-display:swap;}
  @font-face{font-family:'BB Strata ML';src:url('assets/fonts/BBStrata-MLRegular.woff2') format('woff2'),
    url('assets/fonts/BBStrata-MLRegular.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap;}

  :root{ color-scheme:light;
    --paper:#FFFFFF; --ink:#15140F; --grey:#7E7D75; --grey-2:#B6B5AD;
    --hair:rgba(18,16,12,.17); --hair-2:rgba(18,16,12,.08);
    --disp:'BB Strata Pro','Arial Narrow',sans-serif;
    --text:'BB Strata ML',ui-monospace,'SFMono-Regular',Menlo,monospace;
    --accent:#C40021; --r:3px; }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  html,body{margin:0;padding:0;background:#FFFFFF;}
  body{font-family:var(--text);color:var(--ink);background:var(--paper);
    -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.68;}
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;}

  .corner{position:fixed;width:14px;height:14px;border:1px solid var(--grey-2);pointer-events:none;opacity:.5;z-index:60;}
  .corner.tl{top:16px;left:16px;border-right:0;border-bottom:0;} .corner.tr{top:16px;right:16px;border-left:0;border-bottom:0;}
  .corner.bl{bottom:16px;left:16px;border-right:0;border-top:0;} .corner.br{bottom:16px;right:16px;border-left:0;border-top:0;}

  .stage{max-width:1720px;margin:0 auto;padding:0 54px;}
  .page{display:grid;grid-template-columns:368px minmax(0,1fr);gap:60px;align-items:start;}

  /* ===================== LEFT RAIL — anchored, locked, ALWAYS fits (never scrolls) ===================== */
  .rail{position:sticky;top:0;height:100vh;height:100dvh;overflow:visible;
    display:flex;flex-direction:column;padding:30px 14px 22px 0;}
  .wordmark{margin-bottom:54px;flex:0 0 auto;color:var(--ink);}
  .mm-logo{display:block;width:94px;height:auto;}
  .back{position:absolute;left:-38px;top:50%;transform:translateY(-50%);display:inline-flex;align-items:center;color:var(--grey-2);opacity:.7;transition:color .15s,opacity .15s;}
  .back svg{display:block;}
  .back:hover{color:var(--ink);opacity:1;}
  .ident{flex:0 0 auto;} .code-row{position:relative;display:inline-block;margin-bottom:14px;}
  .ident .code{font-size:11.5px;letter-spacing:.28em;color:var(--accent);}
  .ident .name{font-family:var(--disp);font-size:clamp(40px,4vw,58px);line-height:.86;letter-spacing:.004em;
    color:var(--accent);margin:0 0 18px;text-transform:uppercase;hyphens:none;}

  /* constellation — consistent fixed box on every page (contain-fit inside) */
  .blob{position:relative;width:100%;aspect-ratio:5/3.3;flex:0 0 auto;margin-bottom:4px;}
  #minimap{display:block;width:100%;height:100%;cursor:default;}
  .portrait{position:absolute;left:0;right:0;bottom:0;padding:30px 8px 8px;pointer-events:none;opacity:0;transform:translateY(6px);
    transition:opacity .18s,transform .18s;background:linear-gradient(rgba(255,255,255,0),rgba(255,255,255,.94) 42%);}
  .portrait.on{opacity:1;transform:none;pointer-events:auto;}
  .portrait .p-lab{font-family:var(--disp);font-size:15px;color:var(--ink);line-height:1.05;margin-bottom:5px;}
  .portrait .p-blurb{font-size:11px;line-height:1.45;color:var(--grey);margin-bottom:6px;}
  .portrait .p-status{font-size:9px;letter-spacing:.14em;text-transform:uppercase;}
  .portrait .p-status.live{color:var(--accent);cursor:pointer;} .portrait .p-status.idle{color:var(--grey-2);}
  .blob-cap{position:absolute;top:2px;left:1px;font-size:8px;letter-spacing:.24em;color:var(--grey-2);}

  /* section nav — flex-distributed so any count fits without scroll; whole row hoverable */
  .nav{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;border-top:1px solid var(--hair);margin-top:14px;}
  .nav-item{flex:1 1 0;min-height:0;max-height:50px;display:flex;align-items:center;gap:12px;padding:0 2px;
    border-bottom:1px solid var(--hair-2);font-size:13px;letter-spacing:.02em;transition:padding-left .16s ease,color .16s;}
  .nav-item .mk{width:8px;height:8px;border-radius:50%;border:1.4px solid var(--accent);flex:none;transition:background .16s;}
  .nav-item .lab{color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .nav-item.kicker .lab{letter-spacing:.16em;font-size:11.5px;}
  .nav-item.live{cursor:pointer;} .nav-item.live:hover{padding-left:7px;}
  .nav-item.muted .mk{border-color:var(--grey-2);} .nav-item.muted .lab{color:var(--grey-2);}
  .nav-item.active .mk{background:var(--accent);} .nav-item.active .lab{font-family:var(--disp);}

  .pager{flex:0 0 auto;display:flex;justify-content:space-between;gap:10px;padding-top:16px;
    font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--grey-2);}
  .pager a{color:var(--grey);transition:color .15s;} .pager a:hover{color:var(--accent);}
  .pager .here{color:var(--accent);}

  /* ===================== MAIN — masonry + full-width feature cards ===================== */
  .main{padding:78px 0 64px;}
  .cards{column-count:2;column-gap:22px;}
  @media (max-width:1180px){ .cards{column-count:1;} }
  .card{break-inside:avoid;margin:0 0 22px;border:1px solid var(--hair);border-radius:var(--r);background:var(--paper);
    scroll-margin-top:26px;transition:border-color .18s;overflow:hidden;
    opacity:0;transform:translateY(9px);animation:rise .55s cubic-bezier(.2,.7,.2,1) forwards;}
  .card:hover{border-color:rgba(18,16,12,.34);}
  @keyframes rise{to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){ .card{opacity:1;transform:none;animation:none;} html{scroll-behavior:auto;} }
  .card.wide{column-span:all;}

  .card-h{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 20px;border-bottom:1px solid var(--hair-2);}
  .card-h .lbl{font-size:11px;letter-spacing:.22em;color:var(--accent);text-transform:uppercase;}
  .card-h .tag{font-size:9.5px;letter-spacing:.18em;color:var(--grey-2);}
  .card-b{padding:24px 22px;}

  /* lead / opening statement (full width) */
  .card.lead{column-span:all;margin-bottom:26px;}
  .card.lead .card-b{padding:32px 30px;}
  .card.lead .body{max-width:64ch;}
  .card.lead .body p{font-size:15.5px;line-height:1.74;}
  .card.lead .body p:first-child{font-size:20px;line-height:1.56;color:var(--ink);margin-bottom:16px;}

  .body p{margin:0 0 14px;font-size:14px;line-height:1.78;color:var(--ink);}
  .body p:last-child{margin-bottom:0;}
  .body.two{column-count:2;column-gap:36px;}
  .body.two p:first-child{margin-top:0;}
  @media (max-width:620px){ .body.two{column-count:1;} }

  /* spec columns (PROPERTIES) */
  .specs{display:grid;grid-template-columns:1fr 1fr;gap:30px 34px;}
  @media (max-width:560px){ .specs{grid-template-columns:1fr;} }
  .spec .sp-k{font-size:11px;letter-spacing:.16em;color:var(--grey);text-transform:uppercase;margin-bottom:8px;}
  .spec .sp-v{font-family:var(--disp);font-size:23px;color:var(--ink);}
  .spec .sp-v em{font-style:normal;font-family:var(--text);font-size:12px;color:var(--grey);margin-left:6px;}
  .spec .sp-n{font-family:var(--disp);font-size:15px;color:var(--ink);margin:12px 0 8px;}
  .spec .sp-b{font-size:13px;line-height:1.62;color:var(--grey);}

  /* hero — full-width header above the grid */
  .hero-head{margin:0 0 22px;border:1px solid var(--hair);border-radius:var(--r);overflow:hidden;background:var(--paper);
    opacity:0;transform:translateY(9px);animation:rise .55s cubic-bezier(.2,.7,.2,1) forwards;}
  .hero-head img{display:block;width:100%;height:auto;max-height:480px;object-fit:cover;object-position:center;}
  .hero-head .cap2{border-top:1px solid var(--hair-2);}
  @media (prefers-reduced-motion:reduce){ .hero-head{opacity:1;transform:none;animation:none;} }

  /* stat card — at-a-glance figures: full-width row of N columns; stacked list when narrow */
  .statgrid{display:grid;grid-template-columns:repeat(var(--n,4),minmax(0,1fr));gap:26px 22px;}
  .stat .sv{font-family:var(--disp);font-size:21px;color:var(--ink);line-height:1.05;}
  .stat .sk{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--grey);margin-top:7px;}
  @media (max-width:720px){
    .statcard .statgrid{display:flex;flex-direction:column;gap:0;}
    .statcard .stat{display:flex;justify-content:space-between;align-items:baseline;gap:18px;padding:13px 0;border-top:1px solid var(--hair-2);}
    .statcard .stat:first-child{border-top:0;padding-top:0;}
    .statcard .stat .sv{font-size:18px;} .statcard .stat .sk{margin-top:0;text-align:right;}
  }

  /* portrait card gallery (e.g. tarot deck) — full cards, no crop, tactile hover */
  .cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:24px 18px;align-items:start;}
  .cardtile{display:flex;flex-direction:column;gap:10px;}
  .cardtile .ct-img{display:block;width:100%;height:auto;border-radius:7px;border:1px solid var(--hair);background:var(--paper);
    box-shadow:0 1px 3px rgba(18,16,12,.10);transition:transform .24s cubic-bezier(.2,.7,.2,1),box-shadow .24s;}
  .cardtile:hover .ct-img{transform:translateY(-6px) rotate(-1.4deg);box-shadow:0 14px 30px rgba(18,16,12,.22);}
  .cardtile .ct-cap{font-size:10.5px;letter-spacing:.06em;color:var(--grey);text-align:center;}
  @media (prefers-reduced-motion:reduce){ .cardtile:hover .ct-img{transform:none;} }
  @media (max-width:560px){ .cardgrid{grid-template-columns:repeat(auto-fill,minmax(104px,1fr));} }

  /* image + paragraph rows */
  .mc-row{display:grid;grid-template-columns:1fr;gap:16px;}
  .mc-row.has-img{grid-template-columns:1fr 200px;align-items:start;}
  .mc-row + .mc-row{margin-top:24px;padding-top:24px;border-top:1px solid var(--hair-2);}
  .mc-row h4{font-family:var(--disp);font-size:16px;margin:0 0 9px;color:var(--ink);}
  .mc-row p{font-size:13px;line-height:1.64;color:var(--grey);margin:0;}
  .mc-row .thumb{width:100%;aspect-ratio:3/2;object-fit:cover;display:block;border-radius:2px;}
  @media (max-width:560px){ .mc-row.has-img{grid-template-columns:1fr;} }

  /* images + captions (caption distinct from body) */
  .img-real{display:block;width:100%;height:auto;}
  .img-real.framed{padding:18px 18px 6px;}
  .cap2{font-size:11px;line-height:1.5;letter-spacing:.02em;color:var(--grey);padding:11px 18px 14px;}
  .slot{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:13px;
    min-height:300px;padding:38px 30px;border-top:1px solid var(--hair-2);}
  .slot.tall{min-height:480px;}
  .slot .ic{width:34px;height:34px;border:1.5px solid var(--grey-2);border-radius:50%;position:relative;}
  .slot .ic::before,.slot .ic::after{content:"";position:absolute;background:var(--grey-2);}
  .slot .ic::before{width:15px;height:1.5px;top:50%;left:50%;transform:translate(-50%,-50%);}
  .slot .ic::after{width:1.5px;height:15px;top:50%;left:50%;transform:translate(-50%,-50%);}
  .slot .desc{font-size:13px;line-height:1.5;color:var(--grey);max-width:32ch;} .slot .pending{font-size:9px;letter-spacing:.22em;color:var(--grey-2);}

  /* carousel — full-width image gallery */
  .carwrap{position:relative;}
  .carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;}
  .carousel::-webkit-scrollbar{display:none;}
  .cslide{flex:0 0 100%;scroll-snap-align:start;}
  .cslide img{width:100%;display:block;aspect-ratio:16/10;object-fit:cover;}
  .car-btn{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border:1px solid var(--hair);
    background:rgba(255,255,255,.86);color:var(--ink);cursor:pointer;border-radius:50%;font-size:16px;line-height:1;
    display:flex;align-items:center;justify-content:center;transition:.15s;}
  .car-btn.prev{left:14px;} .car-btn.next{right:14px;}
  .car-btn:hover{background:#fff;border-color:var(--accent);color:var(--accent);}

  .media-embed{position:relative;width:100%;aspect-ratio:16/9;background:#0a0a0c;}
  .media-embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}

  /* collaborators */
  .collab .crow{display:grid;grid-template-columns:1fr 1fr auto;align-items:baseline;gap:6px 16px;
    padding:14px 0;font-size:13px;border-top:1px solid var(--hair-2);}
  .collab .crow:first-child{border-top:0;padding-top:2px;}
  .collab .nm{font-family:var(--disp);color:var(--ink);} .collab .ro{color:var(--grey);}
  .collab a{color:var(--accent);justify-self:end;text-align:right;transition:opacity .15s;} .collab a:hover{opacity:.6;}

  .errbox{max-width:600px;margin:12vh auto 0;border-top:2px solid var(--accent);padding:28px 0 0;color:var(--grey);font-size:14px;line-height:1.7;}
  .errbox a{color:var(--accent);}

  @media (max-width:880px){
    .stage{padding:0 26px;}
    .page{grid-template-columns:1fr;gap:8px;}
    .rail{position:static;height:auto;overflow:visible;padding:54px 0 8px;}
    .back{position:static;transform:none;margin:0 0 12px;} .code-row{display:block;}
    .nav-item{max-height:none;padding:14px 2px;}
    .blob{max-width:380px;}
    .main{padding:26px 0 48px;}
  }
</style>
</head>

async function loadProject(slug){
  const res=await fetch(`content/${slug}.json`,{cache:'no-cache'});
  if(!res.ok) throw new Error(`content/${slug}.json → HTTP ${res.status}`);
  return await res.json();
}

/* ===================== constellation (read-only port of index.html metaball) ===================== */
const MM={ A_MAX:0.86, S_LO:0.16, S_HI:0.42, H_REF:1.0, T_EXP:0.8, SE:1.6 };
function smoothstep(a,b,x){const t=clamp((x-a)/(b-a),0,1);return t*t*(3-2*t);}
function computeMetaball(nodes, VW, VH, edge, core){
  // Map the normalized field with the SAME 16:9 position stretch + short-side radius as the homepage,
  // then size the buffer to the blob's full CONTENT box (node disks) so edge nodes at x/y=±1 never clip
  // at a fixed boundary (the homepage avoids this by rendering into a larger canvas with margins).
  const mfd=Math.min(VW,VH);
  const raw=nodes.map(n=>{ const g=n.geom; return { px:(g.x+1)/2*VW, py:VH-(g.y+1)/2*VH, R:g.r*mfd, i:g.i, f:g.f }; });
  let mnx=Infinity,mny=Infinity,mxx=-Infinity,mxy=-Infinity;
  raw.forEach(o=>{ if(o.R<=0)return; if(o.px-o.R<mnx)mnx=o.px-o.R; if(o.px+o.R>mxx)mxx=o.px+o.R; if(o.py-o.R<mny)mny=o.py-o.R; if(o.py+o.R>mxy)mxy=o.py+o.R; });
  if(!isFinite(mnx)){ mnx=0;mny=0;mxx=VW;mxy=VH; }
  const pad=2;
  const BW=Math.max(2,Math.min(1600,Math.ceil(mxx-mnx)+pad*2)), BH=Math.max(2,Math.min(1600,Math.ceil(mxy-mny)+pad*2));
  const offx=pad-mnx, offy=pad-mny;
  const S=new Float32Array(BW*BH), H=new Float32Array(BW*BH);
  const pts=raw.map(o=>[ o.px+offx, o.py+offy ]);
  raw.forEach((o,j)=>{ const px=pts[j][0],py=pts[j][1],R=o.R; if(R<=0)return; const ir2=1/(R*R);
    const x0=Math.max(0,Math.floor(px-R)),x1=Math.min(BW,Math.ceil(px+R));
    const y0=Math.max(0,Math.floor(py-R)),y1=Math.min(BH,Math.ceil(py+R));
    for(let y=y0;y<y1;y++){ const dy=y-py,dy2=dy*dy*ir2,row=y*BW;
      for(let x=x0;x<x1;x++){ const dx=x-px,nd=dx*dx*ir2+dy2; if(nd>=1)continue; const u=1-nd;
        S[row+x]+=Math.pow(u,MM.SE); H[row+x]+=o.i*Math.pow(u,o.f);
      }}});
  const buf=document.createElement('canvas'); buf.width=BW; buf.height=BH;
  const bx=buf.getContext('2d'); const img=bx.createImageData(BW,BH), d=img.data;
  let minx=BW,miny=BH,maxx=0,maxy=0,any=false;
  for(let k=0,q=0;k<S.length;k++,q+=4){ const s=S[k];
    const a=smoothstep(MM.S_LO,MM.S_HI,s)*MM.A_MAX; if(a<=0.003){d[q+3]=0;continue;}
    const t=Math.pow(clamp(H[k]/MM.H_REF,0,1),MM.T_EXP);
    d[q]=lerp(edge[0],core[0],t); d[q+1]=lerp(edge[1],core[1],t); d[q+2]=lerp(edge[2],core[2],t); d[q+3]=a*255;
    const x=k%BW, y=(k/BW)|0; if(x<minx)minx=x; if(x>maxx)maxx=x; if(y<miny)miny=y; if(y>maxy)maxy=y; any=true;
  }
  bx.putImageData(img,0,0);
  if(!any){minx=0;miny=0;maxx=BW;maxy=BH;}
  return { buf, pts, bbox:{minx,miny,maxx,maxy} };
}

const state={ project:null, nodes:[], contentNodes:[], accent:[196,0,33], ink:[196,0,33], mm:null, hoverNodeId:null, activeKey:'classification', imgN:0 };
function hasContent(node){ const c=node&&node.content; return !!(c&&Array.isArray(c.blocks)&&c.blocks.length>0&&!c.hidden); }
function nextImg(){ state.imgN+=1; return 'IMG-'+String(state.imgN).padStart(2,'0'); }

/* ===================== card builders ===================== */
function card(sectionKey, labelText, tagText){
  const c=el('div','card'); c.dataset.section=sectionKey;
  const h=el('div','card-h'); h.appendChild(el('span','lbl',esc(labelText||'')));
  if(tagText) h.appendChild(el('span','tag',esc(tagText)));
  c.appendChild(h); const b=el('div','card-b'); c.appendChild(b); c._b=b; return c;
}
function imageCard(sectionKey, src, desc, tall, opts){
  opts=opts||{}; const lab=nextImg(); const c=el('div','card'+(opts.wide?' wide':'')); c.dataset.section=sectionKey;
  const h=el('div','card-h'); h.appendChild(el('span','lbl',lab)); h.appendChild(el('span','tag',opts.tag||(tall?'COVER':'DETAIL'))); c.appendChild(h);
  if(real(src)){ const im=el('img','img-real'+(isSvg(src)?' framed':'')); im.src=src; im.alt=desc||''; im.loading='lazy'; c.appendChild(im);
    if(real(opts.caption)) c.appendChild(el('div','cap2',esc(opts.caption))); }
  else { const s=el('div','slot'+(tall?' tall':'')); s.appendChild(el('div','ic'));
    if(desc) s.appendChild(el('div','desc',esc(desc)));
    s.appendChild(el('div','pending','PHOTO PENDING')); c.appendChild(s); }
  return c;
}
function carouselCard(sectionKey, b){
  const imgs=(b.images||[]).filter(im=>real(im.src)); if(!imgs.length)return null;
  const c=el('div','card'+(b.wide===false?'':' wide')); c.dataset.section=sectionKey;
  const h=el('div','card-h'); h.appendChild(el('span','lbl',esc(b.title||'GALLERY'))); h.appendChild(el('span','tag',`01 / ${String(imgs.length).padStart(2,'0')}`)); c.appendChild(h);
  const wrap=el('div','carwrap'); const car=el('div','carousel');
  imgs.forEach(im=>{ const sl=el('div','cslide');
    sl.innerHTML=`<img src="${esc(im.src)}" alt="${esc(im.alt||'')}" loading="lazy">`+(real(im.caption)?`<div class="cap2">${esc(im.caption)}</div>`:'');
    car.appendChild(sl); });
  wrap.appendChild(car);
  const tagEl=h.querySelector('.tag');
  const upd=()=>{ const i=Math.round(car.scrollLeft/Math.max(1,car.clientWidth)); tagEl.textContent=`${String(i+1).padStart(2,'0')} / ${String(imgs.length).padStart(2,'0')}`; };
  car.addEventListener('scroll',upd,{passive:true});
  if(imgs.length>1){ const prev=el('button','car-btn prev','‹'), next=el('button','car-btn next','›');
    prev.addEventListener('click',()=>car.scrollBy({left:-car.clientWidth,behavior:'smooth'}));
    next.addEventListener('click',()=>car.scrollBy({left:car.clientWidth,behavior:'smooth'}));
    wrap.appendChild(prev); wrap.appendChild(next); }
  c.appendChild(wrap); return c;
}
function statsCard(sectionKey,b){
  const items=b.items||[]; const c=card(sectionKey,b.title||'AT A GLANCE'); c.classList.add('wide','statcard');
  const g=el('div','statgrid'); g.style.setProperty('--n', Math.max(1,items.length));
  items.forEach(it=>{ const s=el('div','stat'); s.innerHTML=`<div class="sv">${esc(it.v)}</div><div class="sk">${esc(it.k)}</div>`; g.appendChild(s); });
  c._b.appendChild(g); return c;
}
function blockCards(sectionKey, b){
  const out=[]; const type=b.type||'text';
  if(type==='text'){ const c=card(sectionKey,b.title); if(b.wide||b.layout==='two')c.classList.add('wide');
    c._b.appendChild(el('div','body'+(b.layout==='two'?' two':''),paras(b.body))); out.push(c); }
  else if(type==='stats'){ out.push(statsCard(sectionKey,b)); }
  else if(type==='carousel'){ const c=carouselCard(sectionKey,b); if(c)out.push(c); }
  else if(type==='cardgrid'){ const imgs=(b.images||[]).filter(im=>real(im.src));
    if(imgs.length){ const c=card(sectionKey, b.title||'GALLERY', String(imgs.length).padStart(2,'0')+' CARDS'); c.classList.add('wide','cardgridcard');
      const g=el('div','cardgrid');
      imgs.forEach(im=>{ const t=el('div','cardtile');
        t.innerHTML=`<img class="ct-img" src="${esc(im.src)}" alt="${esc(im.alt||im.caption||'')}" loading="lazy">`+(real(im.caption)?`<div class="ct-cap">${esc(im.caption)}</div>`:'');
        g.appendChild(t); });
      c._b.appendChild(g); out.push(c); } }
  else if(type==='column'){ const c=card(sectionKey,b.title); if(b.wide)c.classList.add('wide'); const g=el('div','specs');
    (b.columns||[]).forEach(col=>{ const s=el('div','spec');
      s.innerHTML=(col.spec?`<div class="sp-k">${esc(col.spec)}</div>`:'')+
        (col.value?`<div class="sp-v">${esc(col.value)}${col.valueNote?` <em>${esc(col.valueNote)}</em>`:''}</div>`:'')+
        (col.name?`<div class="sp-n">${esc(col.name)}</div>`:'')+
        (col.body?`<div class="sp-b">${esc(col.body).replace(/\n/g,'<br>')}</div>`:'');
      g.appendChild(s); });
    c._b.appendChild(g); out.push(c); }
  else if(type==='imagePara'){ const c=card(sectionKey,b.title); if(b.wide)c.classList.add('wide');
    (b.rows||[]).forEach(r=>{ const has=real(r.image); const row=el('div','mc-row'+(has?' has-img':''));
      row.appendChild(el('div',null,`<h4>${esc(r.title)}</h4><p>${esc(r.body).replace(/\n/g,'<br>')}</p>`));
      if(has){ const im=el('img','thumb'); im.src=r.image; im.alt=r.title||''; im.loading='lazy'; row.appendChild(im); }
      c._b.appendChild(row); });
    out.push(c); }
  else if(type==='image'){ out.push(imageCard(sectionKey,b.src,b.alt||b.caption,false,{wide:b.wide,caption:b.caption,tag:b.tag})); }
  else if(type==='media'){
    if(b.kind==='video'){ const src=vimeoSrc(b.embed); const c=el('div','card'+(b.wide?' wide':'')); c.dataset.section=sectionKey;

      c.appendChild(el('div',null, src ? `<div class="media-embed"><iframe src="${esc(src)}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe></div>`
        : `<div class="slot"><div class="ic"></div><div class="desc">${esc(b.alt||'Video')}</div><div class="pending">VIDEO PENDING</div></div>`));
      if(real(b.caption))c.appendChild(el('div','cap2',esc(b.caption))); out.push(c); }
    else out.push(imageCard(sectionKey,b.src,b.alt||b.caption,false,{wide:b.wide,caption:b.caption})); }
  else { const c=card(sectionKey,b.title); c._b.appendChild(el('div','body',paras(b.body||''))); out.push(c); }
  return out;
}
function collaboratorsCard(list){
  const c=card('classification','COLLABORATORS'); const w=el('div','collab');

/* ===================== constellation draw (consistent contain-fit box) + interaction ===================== */
function drawMinimap(){
  const mm=state.mm; if(!mm)return; const cv=document.getElementById('minimap'); if(!cv)return;
  const ctx=cv.getContext('2d'); const DPR=Math.min(window.devicePixelRatio||1,2);
  const cssW=cv.clientWidth||320, cssH=cv.clientHeight||210;
  cv.width=Math.round(cssW*DPR); cv.height=Math.round(cssH*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0); ctx.clearRect(0,0,cssW,cssH);
  ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
  const {bbox}=mm; const bw=(bbox.maxx-bbox.minx)||1, bh=(bbox.maxy-bbox.miny)||1;
  const padL=10,padR=10,padT=8,padB=8;
  const sc=Math.min((cssW-padL-padR)/bw,(cssH-padT-padB)/bh);
  const dw=bw*sc, dh=bh*sc; const ox=(cssW-dw)/2, oy=(cssH-dh)/2;
  ctx.drawImage(mm.buf, bbox.minx,bbox.miny,bw,bh, ox,oy,dw,dh);
  mm.markers=[];
  state.nodes.forEach((n,j)=>{ if(!n.label||!n.label.trim())return; const vp=mm.pts[j];
    const x=ox+(vp[0]-bbox.minx)*sc, y=oy+(vp[1]-bbox.miny)*sc;
    const live=hasContent(n);
    const isActive=live&&state.activeKey===n.id, isHover=state.hoverNodeId===n.id, accent=rgbStr(state.ink);
    ctx.beginPath(); ctx.arc(x,y,isActive?5:3.5,0,6.283);
    ctx.fillStyle=(isActive||isHover)?accent:'#FFFFFF'; ctx.fill();
    ctx.lineWidth=isActive?2:1.2; ctx.strokeStyle=live?accent:'rgba(150,148,140,.8)'; ctx.stroke();
    ctx.font='8.5px "BB Strata ML", ui-monospace, monospace'; ctx.textBaseline='middle';
    const tw=ctx.measureText(n.label).width, gap=9, ty=clamp(y,8,cssH-8);
    const align=(x+gap+tw+4>cssW && x-gap-tw-4>=0)?'right':'left';   // flip to the node's left near the right edge so long labels never clip
    const tx=align==='left'?x+gap:x-gap, bx=align==='left'?tx-3:tx-tw-3;
    ctx.textAlign=align;
    if(isHover||isActive){ ctx.fillStyle='rgba(255,255,255,.92)'; ctx.fillRect(bx,ty-7,tw+6,14); }
    ctx.fillStyle=isHover?accent:(live?'#15140F':'#AEACA4'); ctx.fillText(n.label,tx,ty);
    mm.markers.push({id:n.id,x,y,live,lab:{x:bx,y:ty-7,w:tw+6,h:14}}); });
}
function bindMinimap(){ const cv=document.getElementById('minimap');
  const pick=e=>{ const r=cv.getBoundingClientRect(); const mx=e.clientX-r.left, my=e.clientY-r.top; let best=null,bd=20;
    (state.mm.markers||[]).forEach(m=>{ let d=Math.hypot(mx-m.x,my-m.y);
      if(m.lab && mx>=m.lab.x && mx<=m.lab.x+m.lab.w && my>=m.lab.y && my<=m.lab.y+m.lab.h) d=0;
      if(d<bd){bd=d;best=m;} }); return best; };
  cv.addEventListener('pointermove',e=>{ const m=pick(e); const id=m?m.id:null;
    if(id!==state.hoverNodeId){ state.hoverNodeId=id; drawMinimap(); updatePortrait(); cv.style.cursor=(m&&m.live)?'pointer':'default'; } });
  cv.addEventListener('pointerleave',()=>{ if(state.hoverNodeId){state.hoverNodeId=null;drawMinimap();updatePortrait();} });
  cv.addEventListener('click',e=>{ const m=pick(e); if(m&&m.live) scrollToSection(m.id); });
}

/* ===================== nav + portrait ===================== */
function scrollToSection(key){ const t=document.querySelector(`.card[data-section="${key}"]`);
  if(t) t.scrollIntoView({behavior:'smooth',block:'start'}); }
function setActiveKey(key){ if(state.activeKey===key)return; state.activeKey=key;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.key===key)); drawMinimap(); }
function updatePortrait(){
  const elp=document.getElementById('portrait'); if(!elp)return;
  const id = (state.hoverNodeId && state.nodes.find(n=>n.id===state.hoverNodeId)) ? state.hoverNodeId : null;
  const n = id ? state.nodes.find(x=>x.id===id) : null;
  if(!n){ elp.classList.remove('on'); return; }
  const live=hasContent(n);
  elp.innerHTML=`<div class="p-lab">${esc(n.label)}</div>`+(n.blurb?`<div class="p-blurb">${esc(n.blurb)}</div>`:'')+
    `<div class="p-status ${live?'live':'idle'}">${live?'Case study — open ▸':'Mapped · no case study yet'}</div>`;
  if(live){ const st=elp.querySelector('.p-status.live'); if(st) st.addEventListener('click',()=>scrollToSection(n.id)); }
  elp.classList.add('on');
}

/* ===================== render ===================== */
function render(p){
  state.project=p; state.nodes=p.nodes||[]; state.accent=(p.colors&&p.colors.core)||p.accent||[196,0,33]; state.ink=legibleInk(state.accent); state.imgN=0;
  state.activeKey=''; state.hoverNodeId=null;
  state.contentNodes=state.nodes.filter(hasContent).sort((a,b)=>((a.content.order||0)-(b.content.order||0)));
  document.documentElement.style.setProperty('--accent',rgbStr(state.ink));
  document.title=`${p.name} — MODE MODE`;

  const root=document.getElementById('root'); root.innerHTML='';
  const page=el('div','page');

  /* LEFT RAIL */
  const rail=el('aside','rail');
  rail.appendChild(el('div','wordmark',LOGO));
  const ident=el('div','ident',`<div class="code-row"><span class="code">${esc(p.code||'')}</span></div><h1 class="name">${esc(p.name||'')}</h1>`);
  const back=el('a','back','<svg viewBox="0 0 20 12" width="20" height="12" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="square" role="img" aria-label="Back to MODE MODE"><path d="M20 6 H0 M5.5 0.5 L0 6 L5.5 11.5"/></svg>');
  back.href = p.code ? `index.html?focus=${encodeURIComponent(p.code)}` : 'index.html';
  ident.querySelector('.code-row').appendChild(back);
  rail.appendChild(ident);
  const blob=el('figure','blob','<canvas id="minimap"></canvas><figcaption class="blob-cap">OBJECT FIELD</figcaption>');
  const portrait=el('div','portrait'); portrait.id='portrait'; blob.appendChild(portrait);
  rail.appendChild(blob);
  const nav=el('nav','nav');
  const navRow=(key,label,live,kicker)=>{ const it=el('div','nav-item'+(live?' live':' muted')+(kicker?' kicker':'')); it.dataset.key=key;
    it.innerHTML=`<span class="mk"></span><span class="lab">${esc(label)}</span>`;
    if(live) it.addEventListener('click',()=>scrollToSection(key));
    if(key!=='classification'){ it.addEventListener('pointerenter',()=>{state.hoverNodeId=key;drawMinimap();updatePortrait();});
      it.addEventListener('pointerleave',()=>{state.hoverNodeId=null;drawMinimap();updatePortrait();}); }
    nav.appendChild(it); };
  navRow('classification','CLASSIFICATION',true,true);
  state.nodes.forEach(n=>{ if(n.label&&n.label.trim()) navRow(n.id, n.label, hasContent(n), false); });
  rail.appendChild(nav);
  const pg=el('div','pager');
  pg.innerHTML=`${p.prev?`<a href="project.html?p=${esc(p.prev)}">‹ ${esc(slugName(p.prev))}</a>`:'<span></span>'}`+
    `<span class="here">${esc(p.code||'')}</span>`+
    `${p.next?`<a href="project.html?p=${esc(p.next)}">${esc(slugName(p.next))} ›</a>`:'<span></span>'}`;
  rail.appendChild(pg);
  page.appendChild(rail);

  /* MAIN */
  const main=el('div','main');
  const heroData=p.classification&&p.classification.hero;
  if(heroData&&real(heroData.src)){ const hh=el('figure','hero-head');
    hh.innerHTML=`<img src="${esc(heroData.src)}" alt="${esc(heroData.alt||'Cover image')}" loading="eager">`+(real(heroData.caption)?`<figcaption class="cap2">${esc(heroData.caption)}</figcaption>`:'');
    main.appendChild(hh); }
  const cards=el('div','cards'); cards.id='cards'; main.appendChild(cards);
  const all=[];
  ((p.classification&&p.classification.intro)||[]).forEach(b=>blockCards('classification',b).forEach(c=>{ if(!c)return; if((b.type||'text')==='text'&&!b.layout) c.classList.add('lead'); all.push(c); }));
  if(p.classification&&p.classification.collaborators&&p.classification.collaborators.length) all.push(collaboratorsCard(p.classification.collaborators));
  state.contentNodes.forEach(n=>{ (n.content.blocks||[]).forEach(b=>blockCards(n.id,b).forEach(c=>c&&all.push(c))); });
  all.forEach((c,i)=>{ c.style.animationDelay=Math.min(i*45,500)+'ms'; cards.appendChild(c); });
  page.appendChild(main);
  root.appendChild(page);

  const edge=(p.colors&&p.colors.edge)||[255,210,51];
  state.mm=computeMetaball(state.nodes,640,360,edge,state.accent);
  requestAnimationFrame(()=>{ drawMinimap(); bindMinimap();
    if(document.fonts&&document.fonts.ready) document.fonts.ready.then(()=>{ if(state.mm)drawMinimap(); }); });

  const seen=new Map();
  const io=new IntersectionObserver(ents=>{ ents.forEach(e=>seen.set(e.target,e.intersectionRatio));
    let bestKey=state.activeKey,bestR=0; document.querySelectorAll('.card').forEach(c=>{ const r=seen.get(c)||0; if(r>bestR){bestR=r;bestKey=c.dataset.section;} });
    if(bestR>0) setActiveKey(bestKey);
  },{rootMargin:'-12% 0px -55% 0px',threshold:[0,.25,.5,.75,1]});
  document.querySelectorAll('.card').forEach(c=>io.observe(c));
  setActiveKey('classification');
}
function fail(msg){ document.getElementById('root').innerHTML=
  `<div class="errbox"><strong style="color:var(--ink)">Could not load this project.</strong><br><br>${esc(msg)}<br><br>
   <a href="index.html">← Back to MODE MODE</a></div>`; }

function getSlug(){ const q=new URLSearchParams(location.search).get('p'); const h=location.hash?location.hash.replace(/^#/,''):'';
  return (q||h||'nightmare-kart').trim(); }
let _rz=null; window.addEventListener('resize',()=>{ clearTimeout(_rz); _rz=setTimeout(()=>{ if(state.mm)drawMinimap(); },120); });
(async function init(){ const slug=getSlug();
  try{ const p=await loadProject(slug); render(p); }
  catch(err){ const m=(location.protocol==='file:')
      ? 'This page loads its content over http. Open it from a web server — GitHub Pages, or a local server — not by double-clicking the file (file:// blocks the data fetch).'
      : (err&&err.message?err.message:String(err));
    fail(m); } })();
})();
</script>
</body>
