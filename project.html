<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<link rel="icon" href="data:,">
<title>MODE MODE — Project</title>
<style>
  @font-face{font-family:'BB Strata Pro';src:url('assets/fonts/BBStrataProSEF-Bold.woff2') format('woff2'),
    url('assets/fonts/BBStrataProSEF-Bold.ttf') format('truetype');font-weight:700;font-style:normal;font-display:swap;}
  @font-face{font-family:'BB Strata ML';src:url('assets/fonts/BBStrata-MLRegular.woff2') format('woff2'),
    url('assets/fonts/BBStrata-MLRegular.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap;}

  :root{ color-scheme:light;
    /* Canonical token set — shared with index.html (the spine). Keep the two in sync. */
    --ground:#FFFFFF; --panel:#FFFFFF; --ink:#15140F; --grey:#7E7D75; --grey-2:#B6B5AD;
    --hair:rgba(18,16,12,.17); --hair-2:rgba(18,16,12,.08);
    --scrim:255,255,255;   /* what the blob fades into — tracks --ground */
    --disp:'BB Strata Pro','Arial Narrow',sans-serif;
    --text:'BB Strata ML',ui-monospace,'SFMono-Regular',Menlo,monospace;
    --accent:#C40021; --r:3px; }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  html,body{margin:0;padding:0;background:var(--ground);}
  body{font-family:var(--text);color:var(--ink);background:var(--ground);
    -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.68;}
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;}

  .corner{position:fixed;width:14px;height:14px;border:1px solid var(--grey-2);pointer-events:none;opacity:.5;z-index:60;}
  .corner.tl{top:18px;left:18px;border-right:0;border-bottom:0;} .corner.tr{top:18px;right:18px;border-left:0;border-bottom:0;}
  .corner.bl{bottom:18px;left:18px;border-right:0;border-top:0;} .corner.br{bottom:18px;right:18px;border-left:0;border-top:0;}

  .stage{max-width:1720px;margin:0 auto;padding:0 54px;}
  .page{display:grid;grid-template-columns:368px minmax(0,1fr);gap:60px;align-items:start;}

  /* ===================== LEFT RAIL — anchored, locked, ALWAYS fits (never scrolls) ===================== */
  .rail{position:sticky;top:0;height:100vh;height:100dvh;overflow:visible;
    display:flex;flex-direction:column;padding:96px 14px 22px 0;}
  /* one fixed logo lockup — identical viewport position on every page, never jumps */
  .wordmark{position:fixed;top:30px;left:36px;width:94px;z-index:60;color:var(--ink);transition:opacity .15s;}
  .wordmark:hover{opacity:.7;}
  .mm-logo{display:block;width:94px;height:auto;}
  .back{position:absolute;left:-38px;top:50%;transform:translateY(-50%);display:inline-flex;align-items:center;color:var(--grey-2);opacity:.7;transition:color .15s,opacity .15s;}
  .back svg{display:block;}
  .back:hover{color:var(--ink);opacity:1;}
  .ident{flex:0 0 auto;position:relative;z-index:2;} .code-row{position:relative;display:inline-block;margin-bottom:14px;}
  .ident .code{font-size:11.5px;letter-spacing:.28em;color:var(--accent);}
  .ident .name{font-family:var(--disp);font-size:clamp(40px,4vw,58px);line-height:.86;letter-spacing:.004em;
    color:var(--accent);margin:0 0 18px;text-transform:uppercase;hyphens:none;}

  /* ambient project field — the homepage blob: large, borderless, animated + textured, bleeding behind the title (mock #2) */
  .rail-top{position:relative;flex:3 1 auto;min-height:172px;display:flex;flex-direction:column;}
  .field{position:fixed;top:0;left:0;width:46vw;height:100vh;z-index:0;overflow:hidden;pointer-events:none;}
  .field::after{content:'';position:absolute;left:0;right:0;bottom:0;height:30%;pointer-events:none;background:linear-gradient(180deg,rgba(var(--scrim),0),rgb(var(--scrim)));}
  #minimap{display:block;width:100%;height:100%;cursor:default;}
  .field-scrim{position:absolute;top:-86px;left:-30px;right:-26px;height:190px;z-index:1;pointer-events:none;
    background:linear-gradient(180deg,rgba(var(--scrim),.74),rgba(var(--scrim),.18) 64%,rgba(var(--scrim),0));}
  .field-fade{position:absolute;left:-30px;right:-26px;bottom:-4px;height:42%;z-index:1;pointer-events:none;
    background:linear-gradient(180deg,rgba(var(--scrim),0),rgb(var(--scrim)) 90%);}

  /* section nav — flex-distributed so any count fits without scroll; whole row hoverable */
  .nav{flex:2 1 auto;min-height:0;display:flex;flex-direction:column;border-top:1px solid var(--hair);margin-top:14px;position:relative;z-index:2;background:var(--panel);}
  .nav-item{flex:1 1 0;min-height:0;max-height:50px;display:flex;align-items:center;gap:12px;padding:0 2px;
    border-bottom:1px solid var(--hair-2);font-size:13px;letter-spacing:.02em;transition:padding-left .16s ease,color .16s;}
  .nav-item .mk{width:8px;height:8px;border-radius:50%;border:1.4px solid var(--accent);flex:none;transition:background .16s;}
  .nav-item .lab{color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .nav-item.kicker .lab{letter-spacing:.16em;font-size:11.5px;}
  .nav-item.live{cursor:pointer;} .nav-item.live:hover,.nav-item.hover{padding-left:7px;} .nav-item.hover .lab{color:var(--ink);}
  .nav-item.muted .mk{border-color:var(--grey-2);} .nav-item.muted .lab{color:var(--grey-2);}
  .nav-item.active .mk{background:var(--accent);} .nav-item.active .lab{font-family:var(--disp);}

  .pager{flex:0 0 auto;display:flex;justify-content:space-between;gap:10px;padding-top:16px;
    font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--grey-2);}
  .pager a{color:var(--grey);transition:color .15s;} .pager a:hover{color:var(--accent);}
  .pager .here{color:var(--accent);}

  /* ===================== MAIN — masonry + full-width feature cards ===================== */
  .main{padding:78px 0 64px;}
  .cards{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:22px;align-items:stretch;}
  .card{grid-column:span 6;border:1px solid var(--hair);border-radius:var(--r);background:var(--panel);
    scroll-margin-top:26px;transition:border-color .18s;overflow:hidden;
    opacity:0;transform:translateY(9px);animation:rise .55s cubic-bezier(.2,.7,.2,1) forwards;}
  .card:hover{border-color:rgba(18,16,12,.34);}
  @keyframes rise{to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){ .card{opacity:1;transform:none;animation:none;} html{scroll-behavior:auto;} }
  /* per-block widths on the 12-col grid */
  .card.w-full{grid-column:1 / -1;} .card.w-tt{grid-column:span 8;} .card.w-half{grid-column:span 6;} .card.w-third{grid-column:span 4;}
  .card.wide{grid-column:1 / -1;}
  @media (max-width:1180px){ .cards{grid-template-columns:1fr;}
    .card,.card.w-full,.card.w-tt,.card.w-half,.card.w-third,.card.wide,.card.lead{grid-column:1 / -1;} }

  .card-h{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 20px;border-bottom:1px solid var(--hair-2);}
  .card-h .lbl{font-size:11px;letter-spacing:.22em;color:var(--accent);text-transform:uppercase;}
  .card-h .tag{font-size:9.5px;letter-spacing:.18em;color:var(--grey-2);}
  .card-b{padding:24px 22px;}

  /* lead / opening statement (full width) */
  .card.lead{margin-bottom:2px;}
  .card.lead .card-b{padding:32px 30px;}
  .classlead-copy .card.lead .body{max-width:64ch;}
  .card.lead .body p{font-size:15.5px;line-height:1.74;}
  .card.lead .body p:first-child{font-size:20px;line-height:1.56;color:var(--ink);margin-bottom:16px;}

  .body p{margin:0 0 14px;font-size:14px;line-height:1.78;color:var(--ink);}
  .body p:last-child{margin-bottom:0;}
  .card.w-full .body.two, .card.wide .body.two{column-count:2;column-gap:36px;}
  .body.two p:first-child{margin-top:0;}
  @media (max-width:620px){ .body.two{column-count:1;} }

  /* spec columns (PROPERTIES) */
  .specs{display:grid;grid-template-columns:1fr 1fr;gap:30px 34px;}
  @media (max-width:560px){ .specs{grid-template-columns:1fr;} }
  .spec .sp-k{font-size:11px;letter-spacing:.16em;color:var(--grey);text-transform:uppercase;margin-bottom:8px;}
  .spec .sp-v{font-family:var(--disp);font-size:23px;color:var(--ink);}
  .spec .sp-v em{font-style:normal;font-family:var(--text);font-size:12px;color:var(--grey);margin-left:6px;}
  .spec .sp-n{font-family:var(--disp);font-size:15px;color:var(--ink);margin:12px 0 8px;}
  .spec .sp-b{font-size:13px;line-height:1.62;color:var(--grey);}

  /* hero — full-width header above the grid */
  .hero-head{margin:0 0 22px;border:1px solid var(--hair);border-radius:var(--r);overflow:hidden;background:var(--panel);
    opacity:0;transform:translateY(9px);animation:rise .55s cubic-bezier(.2,.7,.2,1) forwards;}
  .hero-head img{display:block;width:100%;height:auto;max-height:480px;object-fit:cover;object-position:center;}
  .hero-head .cap2{border-top:1px solid var(--hair-2);}
  @media (prefers-reduced-motion:reduce){ .hero-head{opacity:1;transform:none;animation:none;} }
  /* vertical / portrait hero — sits beside the CLASSIFICATION intro (magazine 2-col) */
  .classlead{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(248px,.9fr);gap:46px;align-items:start;margin:0 0 30px;}
  .classlead-copy .card.bare{border:0;background:none;overflow:visible;animation:none;opacity:1;transform:none;}
  .classlead-copy .card.bare .card-h{padding:0 0 10px;border:0;}
  .classlead-copy .card.bare .card-b{padding:0;}
  .hero-portrait{margin:0;border:1px solid var(--hair);border-radius:var(--r);overflow:hidden;background:var(--panel);align-self:start;
    opacity:0;transform:translateY(9px);animation:rise .55s cubic-bezier(.2,.7,.2,1) forwards;}
  .hero-portrait img{display:block;width:100%;height:auto;}
  .hero-portrait .cap2{border-top:1px solid var(--hair-2);}
  @media (max-width:880px){ .classlead{grid-template-columns:1fr;gap:22px;} }

  /* stat card — at-a-glance figures: full-width row of N columns; stacked list when narrow */
  .statgrid{display:grid;grid-template-columns:repeat(var(--n,4),minmax(0,1fr));gap:26px 22px;}
  .stat .sv{font-family:var(--disp);font-size:21px;color:var(--ink);line-height:1.05;}
  .stat .sk{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--grey);margin-top:7px;}
  @media (max-width:720px){
    .statcard .statgrid{display:flex;flex-direction:column;gap:0;}
    .statcard .stat{display:flex;justify-content:space-between;align-items:baseline;gap:18px;padding:13px 0;border-top:1px solid var(--hair-2);}
    .statcard .stat:first-child{border-top:0;padding-top:0;}
    .statcard .stat .sv{font-size:18px;} .statcard .stat .sk{margin-top:0;text-align:right;}
  }

  /* portrait card gallery (e.g. tarot deck) — full cards, no crop, tactile hover */
  .cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:24px 18px;align-items:start;}
  .cardtile{display:flex;flex-direction:column;gap:10px;}
  .cardtile .ct-img{display:block;width:100%;height:auto;border-radius:7px;border:1px solid var(--hair);background:var(--panel);
    box-shadow:0 1px 3px rgba(18,16,12,.10);transition:transform .24s cubic-bezier(.2,.7,.2,1),box-shadow .24s;}
  .cardtile:hover .ct-img{transform:translateY(-6px) rotate(-1.4deg);box-shadow:0 14px 30px rgba(18,16,12,.22);}
  .cardtile .ct-cap{font-size:10.5px;letter-spacing:.06em;color:var(--grey);text-align:center;}
  @media (prefers-reduced-motion:reduce){ .cardtile:hover .ct-img{transform:none;} }
  @media (max-width:560px){ .cardgrid{grid-template-columns:repeat(auto-fill,minmax(104px,1fr));} }

  /* image + paragraph rows */
  .mc-row{display:grid;grid-template-columns:1fr;gap:16px;}
  .mc-row.has-img{grid-template-columns:1fr 200px;align-items:start;}
  .mc-row + .mc-row{margin-top:24px;padding-top:24px;border-top:1px solid var(--hair-2);}
  .mc-row h4{font-family:var(--disp);font-size:16px;margin:0 0 9px;color:var(--ink);}
  .mc-row p{font-size:13px;line-height:1.64;color:var(--grey);margin:0;}
  .mc-row .thumb{width:100%;aspect-ratio:3/2;object-fit:cover;display:block;border-radius:2px;}
  @media (max-width:560px){ .mc-row.has-img{grid-template-columns:1fr;} }

  /* images + captions (caption distinct from body) */
  .img-real{display:block;width:100%;height:auto;}
  .img-real.framed{padding:18px 18px 6px;}
  .cropfig{position:relative;display:block;width:100%;margin:0;overflow:hidden;background:var(--panel);}
  .cropfig img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
  .cropfig-rect{position:relative;display:block;width:100%;margin:0;overflow:hidden;background:var(--panel);}
  .cropfig-rect img{position:absolute;display:block;object-fit:cover;max-width:none;}
  /* fit-to-height: uncropped, caption-less images fill the (baseline-locked) card frame */
  .card.imgfit{display:flex;flex-direction:column;}
  .card.imgfit .card-h{flex:0 0 auto;}
  .imgfill{flex:1 1 auto;min-height:0;position:relative;display:block;margin:0;overflow:hidden;background:var(--panel);}
  .imgfill img, .imgfill video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
  .cap2{font-size:11px;line-height:1.5;letter-spacing:.02em;color:var(--grey);padding:11px 18px 14px;}
  .slot{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:13px;
    min-height:300px;padding:38px 30px;border-top:1px solid var(--hair-2);}
  .slot.tall{min-height:480px;}
  .slot .ic{width:34px;height:34px;border:1.5px solid var(--grey-2);border-radius:50%;position:relative;}
  .slot .ic::before,.slot .ic::after{content:"";position:absolute;background:var(--grey-2);}
  .slot .ic::before{width:15px;height:1.5px;top:50%;left:50%;transform:translate(-50%,-50%);}
  .slot .ic::after{width:1.5px;height:15px;top:50%;left:50%;transform:translate(-50%,-50%);}
  .slot .desc{font-size:13px;line-height:1.5;color:var(--grey);max-width:32ch;} .slot .pending{font-size:9px;letter-spacing:.22em;color:var(--grey-2);}

  /* carousel — full-width image gallery */
  .carwrap{position:relative;}
  .carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;}
  .carousel::-webkit-scrollbar{display:none;}
  .cslide{flex:0 0 100%;scroll-snap-align:start;}
  .cslide img{width:100%;display:block;aspect-ratio:16/10;object-fit:cover;}
  .car-btn{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border:1px solid var(--hair);
    background:rgba(255,255,255,.86);color:var(--ink);cursor:pointer;border-radius:50%;font-size:16px;line-height:1;
    display:flex;align-items:center;justify-content:center;transition:.15s;}
  .car-btn.prev{left:14px;} .car-btn.next{right:14px;}
  .car-btn:hover{background:#fff;border-color:var(--accent);color:var(--accent);}

  .media-embed{position:relative;width:100%;aspect-ratio:16/9;background:#0a0a0c;}
  .media-embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
  .media-embed video{position:absolute;inset:0;width:100%;height:100%;border:0;object-fit:cover;background:#0a0a0c;display:block;}

  /* collaborators */
  .collab .crow{display:grid;grid-template-columns:1fr 1fr auto;align-items:baseline;gap:6px 16px;
    padding:14px 0;font-size:13px;border-top:1px solid var(--hair-2);}
  .collab .crow:first-child{border-top:0;padding-top:2px;}
  .collab .nm{font-family:var(--disp);color:var(--ink);} .collab .ro{color:var(--grey);}
  .collab a{color:var(--accent);justify-self:end;text-align:right;transition:opacity .15s;} .collab a:hover{opacity:.6;}

  .errbox{max-width:600px;margin:12vh auto 0;border-top:2px solid var(--accent);padding:28px 0 0;color:var(--grey);font-size:14px;line-height:1.7;}
  .errbox a{color:var(--accent);}

  /* full-screen image lightbox — every content image is clickable */
  .main img{cursor:zoom-in;}
  #lightbox{position:fixed;inset:0;z-index:200;background:rgba(16,18,14,.93);display:none;align-items:center;justify-content:center;cursor:zoom-out;padding:40px;}
  #lightbox.on{display:flex;}
  #lightbox>img{max-width:95vw;max-height:92vh;width:auto;height:auto;display:block;background:#fff;box-shadow:0 12px 64px rgba(0,0,0,.5);}
  #lightbox .lb-close{position:fixed;top:22px;right:26px;font-family:var(--text);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#fff;background:none;border:0;cursor:pointer;opacity:.75;}
  #lightbox .lb-close:hover{opacity:1;}
  @media (max-width:880px){
    .stage{padding:0 36px;}
    .page{grid-template-columns:1fr;gap:8px;}
    .rail{position:static;height:auto;overflow:visible;padding:84px 0 8px;}
    .back{position:static;transform:none;margin:0 0 12px;} .code-row{display:block;}
    .nav-item{max-height:none;padding:14px 2px;}
    .rail-top{flex:0 0 auto;min-height:230px;} .field{top:-30px;left:-16px;right:-16px;}
    .main{padding:26px 0 48px;}
  }
</style>
</head>
<body>
  <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
  <div class="stage"><div id="root"><!-- rendered by JS --></div></div>

<script>
(function(){
"use strict";

const clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t;
const rgbStr=a=>`rgb(${a[0]},${a[1]},${a[2]})`;
const el=(tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;};
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const real=s=>typeof s==='string'&&s.trim().length>0;
function slugName(slug){return String(slug||'').replace(/[-_]+/g,' ').toUpperCase();}
function paras(body){ return String(body==null?'':body).split(/\n{2,}/).map(p=>'<p>'+esc(p).replace(/\n/g,'<br>')+'</p>').join(''); }
/* ── inline edit (the editor's Canvas tab): gated behind ?edit. Everything below is additive —
   edAttr() returns '' unless ?edit, so the live view renders byte-identically. ── */
const EDIT = /(?:^|[?&])edit(?:=|&|$)/.test(location.search);
const edAttr = path => (EDIT && path) ? ` data-edit="${esc(path)}"` : '';
function setByPath(obj,path,val){ const ks=String(path).split('.'); let o=obj;
  for(let i=0;i<ks.length-1;i++){ const k=ks[i]; if(o[k]==null) o[k]=/^\d+$/.test(ks[i+1])?[]:{}; o=o[k]; }
  o[ks[ks.length-1]]=val; }
function getByPath(o,path){ return String(path).split('.').reduce((a,k)=>a==null?a:a[k], o); }
/* per-block width on the 12-col grid (presets) */
const WCLASS={full:'w-full','two-thirds':'w-tt',half:'w-half',third:'w-third'};
const DEFW={text:'half',column:'full',stats:'full',cardgrid:'full',carousel:'full',imagePara:'half',image:'half',media:'half'};
function applyWidth(c,b,forceW){ if(!c)return c; c.classList.remove('wide');
  let w=forceW||(b&&b.width)||(c.classList.contains('lead')?'full':null)||(b&&b.wide?'full':null)||(b&&DEFW[b.type||'text'])||'half';
  c.classList.add(WCLASS[w]||'w-half'); return c; }
function vimeoSrc(embed){ const s=String(embed||'').trim(); if(!s)return '';
  const m=s.match(/(?:vimeo\.com\/(?:video\/)?)?(\d{6,})/); return m?`https://player.vimeo.com/video/${m[1]}`:(s.startsWith('http')?s:''); }
const isSvg=s=>/\.svg(\?|#|$)/i.test(String(s||''));
/* Legible "ink" accent: move the project core away from the ACTIVE ground until rail TEXT +
   minimap markers clear a contrast floor — keeps yellow/light cores readable. Reads --ground from
   CSS rather than assuming white, so the accent follows the theme. The metaball BLOB keeps the
   TRUE edge→core palette (faithful to the homepage); only text/marks use this derived ink. */
function relLum(rgb){ const f=c=>{c/=255;return c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4);};
  return 0.2126*f(rgb[0])+0.7152*f(rgb[1])+0.0722*f(rgb[2]); }
function contrastOn(rgb,ground){ const a=relLum(rgb),b=relLum(ground);
  return (Math.max(a,b)+0.05)/(Math.min(a,b)+0.05); }
function groundRGB(){ try{ const v=getComputedStyle(document.body).getPropertyValue('--ground').trim();
    let m=v.match(/^#([0-9a-fA-F]{6})$/); if(m){ const n=parseInt(m[1],16); return [(n>>16)&255,(n>>8)&255,n&255]; }
    m=v.match(/(\d+)\D+(\d+)\D+(\d+)/); if(m) return [+m[1],+m[2],+m[3]];
  }catch(_){} return [255,255,255]; }
/* HSL round-trip, used only by the lighten branch: on a dark ground we must raise LIGHTNESS
   while holding hue + saturation exactly — scaling RGB up would clip and skew the hue. */
function rgb2hsl(r,g,b){ r/=255;g/=255;b/=255; const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
  let h=0,s=0; const l=(mx+mn)/2;
  if(mx!==mn){ const d=mx-mn; s=l>0.5?d/(2-mx-mn):d/(mx+mn);

/* ===================== constellation draw (consistent contain-fit box) + interaction ===================== */
function drawMinimap(){
  const mm=state.mm; if(!mm)return; const cv=document.getElementById('minimap'); if(!cv)return;
  const ctx=cv.getContext('2d'); const DPR=Math.min(window.devicePixelRatio||1,2);
  const cssW=cv.clientWidth||320, cssH=cv.clientHeight||210;
  cv.width=Math.round(cssW*DPR); cv.height=Math.round(cssH*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0); ctx.clearRect(0,0,cssW,cssH);
  ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
  const {bbox}=mm; const bw=(bbox.maxx-bbox.minx)||1, bh=(bbox.maxy-bbox.miny)||1;
  const padL=10,padR=10,padT=8,padB=8;
  const sc=Math.min((cssW-padL-padR)/bw,(cssH-padT-padB)/bh);
  const dw=bw*sc, dh=bh*sc; const ox=(cssW-dw)/2, oy=(cssH-dh)/2;
  ctx.drawImage(mm.buf, bbox.minx,bbox.miny,bw,bh, ox,oy,dw,dh);
  mm.markers=[];
  state.nodes.forEach((n,j)=>{ if(!n.label||!n.label.trim()||state.hoverNodeId!==n.id)return; const vp=mm.pts[j];
    const x=ox+(vp[0]-bbox.minx)*sc, y=oy+(vp[1]-bbox.miny)*sc;
    const live=hasContent(n);
    const isActive=live&&state.activeKey===n.id, isHover=state.hoverNodeId===n.id, accent=rgbStr(state.ink);
    ctx.beginPath(); ctx.arc(x,y,isActive?5:3.5,0,6.283);
    ctx.fillStyle=(isActive||isHover)?accent:'#FFFFFF'; ctx.fill();
    ctx.lineWidth=isActive?2:1.2; ctx.strokeStyle=live?accent:'rgba(150,148,140,.8)'; ctx.stroke();
    ctx.font='8.5px "BB Strata ML", ui-monospace, monospace'; ctx.textBaseline='middle';
    const tw=ctx.measureText(n.label).width, gap=9, ty=clamp(y,8,cssH-8);
    const align=(x+gap+tw+4>cssW && x-gap-tw-4>=0)?'right':'left';   // flip to the node's left near the right edge so long labels never clip
    const tx=align==='left'?x+gap:x-gap, bx=align==='left'?tx-3:tx-tw-3;
    ctx.textAlign=align;
    if(isHover||isActive){ ctx.fillStyle='rgba(255,255,255,.92)'; ctx.fillRect(bx,ty-7,tw+6,14); }
    ctx.fillStyle=isHover?accent:(live?'#15140F':'#AEACA4'); ctx.fillText(n.label,tx,ty);
    mm.markers.push({id:n.id,x,y,live,lab:{x:bx,y:ty-7,w:tw+6,h:14}}); });
}
function bindMinimap(){ const cv=document.getElementById('minimap');
  const pick=e=>{ const r=cv.getBoundingClientRect(); const mx=e.clientX-r.left, my=e.clientY-r.top; let best=null,bd=20;
    (state.mm.markers||[]).forEach(m=>{ let d=Math.hypot(mx-m.x,my-m.y);
      if(m.lab && mx>=m.lab.x && mx<=m.lab.x+m.lab.w && my>=m.lab.y && my<=m.lab.y+m.lab.h) d=0;
      if(d<bd){bd=d;best=m;} }); return best; };
  cv.addEventListener('pointermove',e=>{ const m=pick(e); const id=m?m.id:null;
    if(id!==state.hoverNodeId){ state.hoverNodeId=id; drawMinimap(); updatePortrait(); cv.style.cursor=(m&&m.live)?'pointer':'default'; } });
  cv.addEventListener('pointerleave',()=>{ if(state.hoverNodeId){state.hoverNodeId=null;drawMinimap();updatePortrait();} });
  cv.addEventListener('click',e=>{ const m=pick(e); if(m&&m.live) scrollToSection(m.id); });
}

    else { ax=c0.x+c0.w; ay=c0.y; w=C(ax-px,MIN,ax); h=w*ar/P; if(ay+h>1){h=1-ay;w=h*P/ar;} cr={x:ax-w,y:ay,w,h}; }

function openCropPanel(card, path){ closeMenu(); closeCrop();

  panel.appendChild(cropBoxUI(block,_key,()=>postDoc()));
  const done=document.createElement('button'); done.className='mm-crop-done'; done.textContent='Done';
  done.addEventListener('click',e=>{ e.stopPropagation(); e.preventDefault(); closeCrop(); renderDoc(DOC); });

let _mmSel=null;
function _selClear(apply){ if(!_mmSel)return; const s=_mmSel; _mmSel=null; if(s.overlay)s.overlay.remove(); if(s.toolbar)s.toolbar.remove(); if(s.rhs)s.rhs.forEach(h=>h.remove()); if(s.cardEl)s.cardEl.classList.remove('mm-selcard'); if(s.outside)document.removeEventListener('mousedown',s.outside); closeMenu(); if(apply) renderDoc(DOC); }
function deselectImage(){ _selClear(true); }
function startResize(e, cardEl, cardsEl, path, handle, axes){
  const GAP=22, COLS=12; const cw=cardsEl?cardsEl.getBoundingClientRect().width:0; const unit=cw?(cw-(COLS-1)*GAP)/COLS:1;
  const SPANW=[[4,'w-third','third'],[6,'w-half','half'],[8,'w-tt','two-thirds'],[12,'w-full','full']];
  const sr=cardEl.getBoundingClientRect(); const sx=e.clientX, sy=e.clientY, sw=sr.width, sh=sr.height; let curW=null,curH=null;
  try{handle.setPointerCapture(e.pointerId);}catch(_){}
  const nearest=(px)=>{ const raw=(px+GAP)/(unit+GAP); let best=SPANW[0],bd=1e9; SPANW.forEach(s=>{ const d=Math.abs(s[0]-raw); if(d<bd){bd=d;best=s;} }); return best; };
  const move=ev=>{
    if(axes.indexOf('x')>=0&&cardsEl){ const s=nearest(sw+(ev.clientX-sx)); if(s[2]!==curW){ curW=s[2]; ['w-full','w-tt','w-half','w-third','wide'].forEach(x=>cardEl.classList.remove(x)); cardEl.classList.add(s[1]); } }
    if(axes.indexOf('y')>=0){ curH=Math.max(90,Math.round(sh+(ev.clientY-sy))); cardEl.style.minHeight=curH+'px'; }
  };
  const up=()=>{ document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up);
    const b=getByPath(DOC,path); if(b&&typeof b==='object'){ if(curW){ b.width=curW; delete b.wide; } if(curH){ b.height=curH; } }
    if(curW||curH){ _selClear(false); postDoc(); renderDoc(DOC); } };
  document.addEventListener('pointermove',move); document.addEventListener('pointerup',up);

function selectImage(img, path){ if(_mmSel&&_mmSel.path===path)return; _selClear(false); closeMenu(); closeCrop(); closeImgPanel();

  const block=getByPath(DOC,_bpath); if(!block||typeof block!=='object')return; cropPanelStyle();
  let anchor=img.closest('figure'); if(!anchor) anchor=img.closest('.card')||img.parentElement;
  if(getComputedStyle(anchor).position==='static') anchor.style.position='relative';
  const cardEl=img.closest('.card'); const bound=cardEl||anchor; if(cardEl)cardEl.classList.add('mm-selcard');

function openLayoutMenu(anchor, path){ closeMenu(); const block=getByPath(DOC,path); if(!block)return;
